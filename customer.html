<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pine &amp; Co Seoul — Waiting</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1e1208;--cream:#f0ebe0;--gold:#b8935a;--amber:#c9a96e;--muted:#7a6550;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}

.content{position:relative;z-index:2;flex:1;display:flex;flex-direction:column;align-items:center;
  padding:0 24px 80px;max-width:460px;margin:0 auto;width:100%;}

/* 로고 */
.logo-header{padding:48px 0 28px;display:flex;flex-direction:column;align-items:center;}
.logo-img{width:180px;height:auto;}

/* 구분선 */
.divider{display:flex;align-items:center;gap:14px;width:100%;margin:0 0 18px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.divider span{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.22em;color:var(--gold);white-space:nowrap;}

/* 대기 뱃지 */
.wait-badge{text-align:center;font-size:13px;color:var(--muted);margin-bottom:24px;line-height:1.7;}
.wait-badge strong{color:var(--gold);font-weight:500;}

/* 폼 */
.form-wrap{width:100%;display:flex;flex-direction:column;gap:16px;}
.field label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;color:var(--amber);margin-bottom:6px;}
.field input,.field select{width:100%;background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;
  padding:14px 16px;font-size:16px;color:var(--cream);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field input::placeholder{color:rgba(240,235,224,.25);}
.field select option{background:var(--ink);color:var(--cream);}
.phone-row{display:flex;gap:8px;}
.phone-row select{width:130px;flex-shrink:0;font-size:14px;padding:14px 8px;}
.phone-row input{flex:1;}
.btn-primary{width:100%;padding:16px;border:none;border-radius:6px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:.14em;font-weight:500;
  background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--ink);
  transition:opacity .2s,transform .1s;margin-top:4px;}
.btn-primary:hover{opacity:.92;}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.5;cursor:default;}
.form-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;line-height:1.7;}

/* Party size selector */
.size-row{display:flex;gap:8px;flex-wrap:wrap;}
.sz-btn{width:44px;height:44px;border:1px solid rgba(184,147,90,.25);border-radius:8px;
  background:rgba(240,235,224,.06);color:var(--cream);font-family:'Cormorant Garamond',serif;
  font-size:18px;cursor:pointer;transition:all .15s;}
.sz-btn:hover{background:rgba(184,147,90,.12);}
.sz-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600;}

/* 등록 후 화면 */
.my-card{width:100%;text-align:center;padding:24px 0;}
.my-num{font-family:'Cormorant Garamond',serif;font-size:80px;font-weight:300;color:var(--gold);line-height:1;}
.my-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.2em;color:var(--amber);margin-top:4px;}
.my-pos{font-size:24px;color:var(--cream);margin-top:20px;line-height:1.5;}
.my-pos strong{color:var(--gold);font-size:30px;}
.timer-wrap{width:100%;margin-top:24px;}
.timer-bar{height:4px;border-radius:2px;background:var(--gold);transition:width 1s linear;}
.timer-text{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--amber);text-align:center;margin-top:8px;}
.btn-cancel{background:none;border:1px solid rgba(184,147,90,.3);border-radius:6px;padding:10px 24px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;color:var(--muted);cursor:pointer;margin-top:20px;transition:border .2s;}
.btn-cancel:hover{border-color:var(--gold);color:var(--cream);}
.btn-new{background:none;border:1px solid rgba(184,147,90,.3);border-radius:6px;padding:10px 24px;
  font-family:'Cinzel',serif;font-size:10px;letter-spacing:.14em;color:var(--muted);cursor:pointer;margin-top:16px;transition:border .2s;}
.btn-new:hover{border-color:var(--gold);color:var(--cream);}

/* 입장 안내 */
.called-banner{width:100%;text-align:center;padding:20px;border-radius:8px;
  background:linear-gradient(135deg,rgba(184,147,90,.15),rgba(201,169,110,.1));
  border:1px solid rgba(184,147,90,.3);margin-top:16px;}
.called-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.12em;color:var(--gold);margin-bottom:8px;}
.called-sub{font-size:12px;color:var(--muted);}

/* 토스트 */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(30,18,8,.92);border:1px solid var(--gold);color:var(--cream);border-radius:8px;
  font-size:13px;letter-spacing:.18em;padding:12px 24px;border-radius:3px;
  z-index:99;white-space:nowrap;max-width:90vw;text-align:center;
  pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(12px);}
.toast.show{opacity:1;}
/* === COCKTAIL LAB GAME CARD === */
.game-card-cta{
  display:block;margin:24px 0 16px;padding:28px 20px 22px;
  background:linear-gradient(165deg,rgba(184,147,90,.18) 0%,rgba(201,169,110,.08) 60%,rgba(184,147,90,.12) 100%);
  border:1.5px solid rgba(201,169,110,.4);
  border-radius:16px;text-align:center;text-decoration:none;color:var(--cream);
  box-shadow:0 4px 24px rgba(184,147,90,.12),inset 0 1px 0 rgba(255,240,210,.08);
  animation:gameCardIn .8s ease-out;
  position:relative;overflow:hidden;
}
.game-card-cta::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(201,169,110,.15),transparent);
  animation:shimmer 4s ease-in-out infinite;
}
.game-shaker{
  display:block;
  margin-bottom:8px;
  text-align:center;
}
.game-card-title{
  font-family:'Cinzel',serif;font-size:18px;letter-spacing:.18em;
  color:#c9a96e;font-weight:500;margin:6px 0 12px;
}
.game-card-reward{
  font-size:14px;color:#f0ebe0;margin:0 0 4px;font-weight:500;
}
.game-card-meta{
  font-size:11px;color:rgba(240,235,224,.55);letter-spacing:.05em;margin:0 0 18px;
}
.game-card-btn{
  display:inline-block;padding:13px 36px;
  background:linear-gradient(180deg,#c9a96e 0%,#b8935a 100%);
  color:#1e1208;border-radius:30px;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:.18em;font-weight:600;
  box-shadow:0 4px 16px rgba(201,169,110,.35),0 0 0 0 rgba(201,169,110,.5);
  animation:btnGlow 2.4s ease-in-out infinite;
  margin-bottom:14px;
}
.game-card-foot{
  font-size:10px;color:rgba(240,235,224,.4);letter-spacing:.04em;
  border-top:1px solid rgba(201,169,110,.15);padding-top:12px;margin-top:4px;
}
@keyframes shakeIt{
  0%,100%{transform:rotate(0deg);}
  10%{transform:rotate(-12deg) translateY(-1px);}
  20%{transform:rotate(11deg) translateY(-2px);}
  30%{transform:rotate(-10deg) translateY(-1px);}
  40%{transform:rotate(9deg) translateY(-2px);}
  50%{transform:rotate(-8deg) translateY(-1px);}
  60%{transform:rotate(6deg);}
  70%{transform:rotate(-4deg);}
  80%{transform:rotate(2deg);}
  90%{transform:rotate(-1deg);}
}
@keyframes btnGlow{
  0%,100%{box-shadow:0 4px 16px rgba(201,169,110,.35),0 0 0 0 rgba(201,169,110,.4);}
  50%{box-shadow:0 4px 20px rgba(201,169,110,.55),0 0 28px 4px rgba(201,169,110,.25);}
}
@keyframes gameCardIn{
  0%{opacity:0;transform:translateY(20px) scale(.96);}
  100%{opacity:1;transform:translateY(0) scale(1);}
}
@keyframes shimmer{
  0%,90%,100%{left:-100%;}
  50%{left:100%;}
}
</style>
</head>

  {code:'+90',name:'Turkey',flag:'🇹🇷'},
  {code:'+972',name:'Israel',flag:'🇮🇱'},
  {code:'+27',name:'South Africa',flag:'🇿🇦'},

let selectedCountry='+82';

// safeFetch: returns {ok, data} — never crashes
async function safeFetch(url,opts){
  try{
    const r=await fetch(url,opts);
    let d=null;
    try{ d=await r.json(); }catch{ /* response not JSON (502/503/HTML error page) */ }
    return {ok:r.ok, status:r.status, data:d};
  }catch(e){
    // Network error (no internet, server down)
    console.error('Network error:',e.message);
    return {ok:false, status:0, data:null};
  }
}
async function reloadQueue(){const res=await safeFetch('/api/queue');if(res.ok&&Array.isArray(res.data))queue=res.data;}

async function init(){
  const c=await safeFetch('/api/config');if(c.ok&&c.data)cfg=c.data;
  await reloadQueue();
  render();
  connectSSE();
}
function connectSSE(){
  try{
    const es=new EventSource('/api/stream');
    es.onmessage=e=>{try{
      const d=JSON.parse(e.data);
      if(d&&d.queue){queue=d.queue;}
      else if(Array.isArray(d)){queue=d;}
      render();
    }catch{}};
    es.onerror=()=>{es.close();setTimeout(connectSSE,3000);};
  }catch{setTimeout(connectSSE,5000);}
}

// Format phone: just clean digits, no dashes for international
function fmt(v){
  const d=v.replace(/\D/g,'');
  // Korean format with dashes
  if(selectedCountry==='+82'){
    const s=d.slice(0,11);
    if(s.length<=3)return s;if(s.length<=7)return s.slice(0,3)+'-'+s.slice(3);
    return s.slice(0,3)+'-'+s.slice(3,7)+'-'+s.slice(7);
  }
  // International: just digits, max 15
  return d.slice(0,15);
}

function onCountryChange(val){
  selectedCountry=val;
  const inp=document.getElementById('p');
  if(inp){
    inp.value='';
    inp.placeholder=val==='+82'?'010 ···· ····':'Phone number';
  }
  // For non-Korean numbers: clearly request email (SMS unreliable internationally)
  const cnNotice=document.getElementById('cnNotice');
  const emHint=document.getElementById('emailHint');
  const emInput=document.getElementById('em');
  const isForeign = val !== '+82';
  if(isForeign){
    if(cnNotice)cnNotice.style.display='block';
    if(emHint)emHint.textContent='(required for international guests)';
    if(emHint)emHint.style.color='#c9a96e';
    if(emInput)emInput.style.borderColor='#c9a96e';
  }else{
    if(cnNotice)cnNotice.style.display='none';
    if(emHint)emHint.textContent='(optional if phone provided)';
    if(emHint)emHint.style.color='';
    if(emInput)emInput.style.borderColor='';
  }
}

function pickSize(n){
  partySize=n;
  document.querySelectorAll('.sz-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

async function register(){
  const name=document.getElementById('n')?.value.trim();
  const rawPhone=document.getElementById('p')?.value.trim()||'';
  const email=document.getElementById('em')?.value.trim()||'';
  if(!name){flash('Please enter your name. / 이름을 입력해주세요.');return;}
  if(name.length>50){flash('Name is too long (max 50 characters). / 이름이 너무 깁니다.');return;}
  const digits=rawPhone.replace(/\D/g,'');
  if(!rawPhone&&!email){flash('Please enter a phone number or email. / 전화번호 또는 이메일을 입력해주세요.');return;}
  if(rawPhone&&digits.length<7){flash('Please enter a valid phone number. / 올바른 전화번호를 입력해주세요.');return;}
  if(rawPhone&&digits.length>15){flash('Phone number is too long. / 전화번호가 너무 깁니다.');return;}
  // Validate email format
  if(email){
    const emailRe=/^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if(!emailRe.test(email)){flash('Please enter a valid email. / 이메일 형식이 올바르지 않습니다.');document.getElementById('em')?.focus();return;}
    if(email.length>100){flash('Email is too long. / 이메일이 너무 깁니다.');return;}
  }

  // Foreign guests: email required — international SMS often fails to deliver
  if(selectedCountry!=='+82'&&rawPhone&&!email){
    flash('Please provide your email — we\'ll send your table notifications there. / 한국 번호가 아닌 경우 이메일을 부탁드립니다.');
    document.getElementById('em')?.focus();
    return;
  }

  // Build full phone with country code
  let phone='';
  if(rawPhone){
    if(selectedCountry==='+82'){
      phone=digits.startsWith('0')?digits:'0'+digits;
    }else{
      phone=selectedCountry+digits;
    }
  }

  const btn=document.getElementById('btn');if(btn){btn.disabled=true;btn.textContent='REGISTERING ...';}
  try{
    const res=await safeFetch('/api/queue/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,phone,partySize,email})});
    if(!res.ok){
      if(res.data?.existing){
        myId=res.data.existing.id;submitted=true;history.replaceState(null,'',`?id=${myId}`);
        await reloadQueue();render();
        flash(res.data?.error||'You are already on the waiting list.');return;
      }
      throw new Error(res.data?.error||'Could not connect to server. Please try again. / 서버 연결에 실패했습니다.');
    }
    myId=res.data.id;submitted=true;history.replaceState(null,'',`?id=${myId}`);
    await reloadQueue();render();
    // Visual confirmation: prominent toast + scroll to top so guest sees their number clearly
    flash(`✅ 등록 완료! Welcome #${res.data.number}`);
    window.scrollTo({top:0,behavior:'smooth'});
  }catch(e){
    flash(e.message);
    if(btn){btn.disabled=false;btn.textContent='JOIN THE WAITING LIST';}
    // Show prominent fallback: if registration fails, guest should call directly
    setTimeout(function(){
      const existing=document.getElementById('fallbackCall');
      if(existing)return;
      const div=document.createElement('div');
      div.id='fallbackCall';
      div.style.cssText='margin:16px 0;padding:16px;background:rgba(170,51,51,.08);border:1px solid rgba(170,51,51,.3);border-radius:10px;text-align:center;';
      div.innerHTML=`
        <p style="font-size:12px;color:#c33;margin-bottom:8px;font-weight:500;">
          ⚠️ Having trouble? Please call us directly<br>
          <span style="color:#a89478;font-size:11px;">등록이 안 되면 전화로 부탁드립니다</span>
        </p>
        <a href="tel:010-6817-0406" style="display:inline-block;padding:12px 24px;background:var(--gold);color:#1e1208;text-decoration:none;border-radius:8px;font-weight:600;font-family:'Cinzel',serif;letter-spacing:.05em;">📞 010-6817-0406</a>`;
      const form=document.querySelector('.form-wrap');
      if(form)form.parentNode.insertBefore(div,form.nextSibling);
    },200);
  }
}

async function cancel(){
  if(!myId)return;
  try{await fetch(`/api/queue/${myId}`,{method:'DELETE'});}catch{}
  myId=null;submitted=false;history.replaceState(null,'',location.pathname);
  await reloadQueue();render();
}
function reset(){myId=null;submitted=false;history.replaceState(null,'',location.pathname);render();}

async function declineWaiting(){
  if(!myId)return;
  if(!confirm('정말 취소하시겠습니까?\nAre you sure you want to cancel?'))return;
  try{await fetch(`/api/queue/decline/${myId}`,{method:'POST'});}catch{}
  flash('웨이팅이 취소되었습니다. / Your waiting has been cancelled.');
  myId=null;submitted=false;history.replaceState(null,'',location.pathname);
  await reloadQueue();render();
}

let _ti=null;
function startTimer(ca){
  if(_ti)clearInterval(_ti);
  const total=(cfg.autoCancelMin||5)*60000;
  function tick(){
    const bar=document.getElementById('tb');if(!bar){clearInterval(_ti);return;}
    const elapsed=Date.now()-ca;
    const pct=Math.max(0,100-elapsed/total*100);
    bar.style.width=pct+'%';
    bar.style.background=pct>40?'#b8935a':pct>20?'#c9a030':'#a05050';
    const remain=Math.max(0,Math.ceil((total-elapsed)/1000));
    const mm=String(Math.floor(remain/60)).padStart(2,'0');
    const ss=String(remain%60).padStart(2,'0');
    const tt=document.getElementById('tt');if(tt)tt.textContent=`${mm}:${ss} remaining`;
    if(pct<=0){clearInterval(_ti);reloadQueue().then(render);}
  }
  tick();_ti=setInterval(tick,1000);
}
