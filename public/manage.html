<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pine &amp; Co — Reservation Management</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1e1208;--ink2:#2a1a0e;--cream:#f0ebe0;--gold:#b8935a;--amber:#c9a96e;--muted:#7a6550;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;}
#pin-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.pin-title{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.22em;color:var(--gold);margin-bottom:6px;}
.pin-sub{font-size:12px;color:var(--muted);margin-bottom:28px;}
.pin-dots{display:flex;gap:14px;margin-bottom:28px;}
.dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--gold);background:transparent;transition:background .15s;}
.dot.on{background:var(--gold);}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:10px;justify-content:center;}
.pin-btn{width:72px;height:56px;border:1px solid rgba(184,147,90,.25);border-radius:8px;
  background:rgba(240,235,224,.04);color:var(--cream);font-family:'Cormorant Garamond',serif;font-size:24px;cursor:pointer;transition:background .15s;}
.pin-btn:hover{background:rgba(184,147,90,.12);}
.pin-btn.del{font-size:18px;color:var(--muted);}
.pin-err{color:#c07070;font-size:12px;margin-top:16px;min-height:18px;}
#main{display:none;}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(184,147,90,.15);position:sticky;top:0;background:var(--ink);z-index:10;}
.hdr-name{font-family:'Cinzel',serif;font-size:14px;letter-spacing:.08em;}
.hdr-sub{font-family:'Cinzel',serif;font-size:9px;letter-spacing:.16em;color:var(--muted);}
.btn-lock{background:none;border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:8px 14px;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.1em;color:var(--muted);cursor:pointer;}
.main-body{padding:16px;max-width:800px;margin:0 auto;}
.date-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.date-nav button{background:none;border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:8px 14px;color:var(--cream);cursor:pointer;font-size:14px;}
.date-nav button:hover{border-color:var(--gold);}
.date-label{font-family:'Cinzel',serif;font-size:16px;letter-spacing:.08em;color:var(--gold);flex:1;text-align:center;}
.time-tabs{display:flex;gap:6px;margin-bottom:16px;}
.time-tab{padding:10px 20px;border:1px solid rgba(184,147,90,.25);border-radius:6px;background:none;color:var(--cream);
  font-family:'Cormorant Garamond',serif;font-size:18px;cursor:pointer;transition:all .15s;}
.time-tab:hover{background:rgba(184,147,90,.1);}
.time-tab.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.time-tab .tab-count{font-size:11px;font-family:'Noto Sans KR',sans-serif;display:block;margin-top:2px;opacity:.7;}

/* Floor layout */
.floor{background:rgba(240,235,224,.03);border:1px solid rgba(184,147,90,.15);border-radius:12px;padding:20px;margin-bottom:16px;position:relative;}
.floor-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.16em;color:var(--muted);margin-bottom:16px;}
.floor svg{width:100%;height:auto;}
.seat-free{fill:rgba(240,235,224,.08);stroke:rgba(184,147,90,.2);stroke-width:1;cursor:pointer;}
.seat-taken{fill:rgba(184,147,90,.25);stroke:var(--gold);stroke-width:1.5;cursor:pointer;}
.seat-walkin{fill:rgba(100,180,100,.2);stroke:rgba(100,180,100,.5);stroke-width:1.5;cursor:pointer;}
.seat-label{font-family:'Cinzel',serif;font-size:9px;fill:var(--muted);text-anchor:middle;pointer-events:none;}
.seat-name{font-family:'Noto Sans KR',sans-serif;font-size:8px;fill:var(--gold);text-anchor:middle;pointer-events:none;}
.bar-counter{fill:none;stroke:rgba(184,147,90,.3);stroke-width:2;rx:8;}
.bar-label{font-family:'Cinzel',serif;font-size:11px;fill:rgba(184,147,90,.4);text-anchor:middle;letter-spacing:.2em;}
.room-border{fill:rgba(240,235,224,.03);stroke:rgba(184,147,90,.2);stroke-width:1.5;stroke-dasharray:6 3;rx:8;}

/* Reservation list */
.res-list{display:flex;flex-direction:column;gap:8px;margin-top:16px;}
.res-card{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid rgba(184,147,90,.15);border-radius:8px;background:rgba(240,235,224,.03);}
.res-time{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--gold);min-width:50px;}
.res-info{flex:1;min-width:0;}
.res-name{font-size:14px;}
.res-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.res-seats{font-size:11px;color:var(--amber);}
.res-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-seat{padding:6px 12px;border:1px solid rgba(100,180,100,.4);border-radius:5px;background:rgba(100,180,100,.12);color:#8bc48b;font-family:'Cinzel',serif;font-size:10px;cursor:pointer;}
.btn-noshow{padding:6px 10px;border:1px solid rgba(180,80,80,.3);border-radius:5px;background:rgba(180,80,80,.1);color:#d08080;font-size:10px;cursor:pointer;}
.btn-cancel-res{padding:6px 10px;border:1px solid rgba(184,147,90,.2);border-radius:5px;background:none;color:var(--muted);font-size:10px;cursor:pointer;}
.badge-seated{color:#8bc48b;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.1em;}
.badge-noshow{color:#d08080;font-size:10px;font-family:'Cinzel',serif;letter-spacing:.1em;}
.empty-msg{text-align:center;padding:30px 0;color:var(--muted);font-size:13px;}
.legend{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted);}
.legend-dot{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:4px;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:rgba(30,18,8,.92);border:1px solid var(--gold);color:var(--cream);border-radius:8px;font-size:13px;padding:12px 24px;z-index:99;opacity:0;transition:opacity .3s;}
.toast.show{opacity:1;}
</style>
</head>
<body>
<div id="pin-screen">
  <div class="pin-title">STAFF ACCESS</div>
  <div class="pin-sub">Enter PIN to manage reservations</div>
  <div class="pin-dots"><div class="dot" id="d0"></div><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
  <div class="pin-pad">
    <button class="pin-btn" onclick="tapPin('1')">1</button><button class="pin-btn" onclick="tapPin('2')">2</button><button class="pin-btn" onclick="tapPin('3')">3</button>
    <button class="pin-btn" onclick="tapPin('4')">4</button><button class="pin-btn" onclick="tapPin('5')">5</button><button class="pin-btn" onclick="tapPin('6')">6</button>
    <button class="pin-btn" onclick="tapPin('7')">7</button><button class="pin-btn" onclick="tapPin('8')">8</button><button class="pin-btn" onclick="tapPin('9')">9</button>
    <div></div><button class="pin-btn" onclick="tapPin('0')">0</button><button class="pin-btn del" onclick="pinDel()">&#9003;</button>
  </div>
  <div class="pin-err" id="pin-err"></div>
</div>
<div id="main">
  <header>
    <div><div class="hdr-name">Pine &amp; Co Seoul</div><div class="hdr-sub">RESERVATIONS</div></div>
    <button class="btn-lock" onclick="logout()">&#128274; LOCK</button>
  </header>
  <div class="main-body" id="body"></div>
</div>
<div class="toast" id="toast"></div>
<script>
let pin='',staffPin='1234',viewDate='',viewTime='',resList=[],pollTimer=null,showAddForm=false,addZone='table',addSize=2,showHist=false,walkinSeats=[];

async function loadConfig(){try{const r=await fetch('/api/config');if(r.ok){const c=await r.json();staffPin=c.staffPin||'1234';}}catch{}}
loadConfig();

function toggleAddForm(){showAddForm=!showAddForm;render();}
function setAddZone(z){addZone=z;render();}
function setAddSize(n){addSize=n;render();}

async function staffAddReservation(){
  const name=document.getElementById('add-name')?.value.trim();
  const phone=document.getElementById('add-phone')?.value.trim();
  const date=document.getElementById('add-date')?.value;
  const time=document.getElementById('add-time')?.value;
  if(!name||!phone||!date||!time){flash('Please fill in all fields.');return;}
  const btn=document.getElementById('add-btn');if(btn){btn.disabled=true;btn.textContent='SAVING...';}
  try{
    const r=await fetch('/api/reserve',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,phone,partySize:addSize,zone:addZone,date,time,source:'staff'})});
    const d=await r.json();
    if(!r.ok){flash(d.error||'Failed');if(btn){btn.disabled=false;btn.textContent='ADD RESERVATION';}return;}
    flash('Reservation added: '+d.assignedSeats.join(', '));
    showAddForm=false;viewDate=date;viewTime=time;loadDay();
  }catch(e){flash('Error');if(btn){btn.disabled=false;btn.textContent='ADD RESERVATION';}}
}

function tapPin(d){if(pin.length>=4)return;pin+=d;updDots();if(pin.length===4)setTimeout(checkPin,80);}
function pinDel(){pin=pin.slice(0,-1);updDots();document.getElementById('pin-err').textContent='';}
function updDots(){for(let i=0;i<4;i++)document.getElementById('d'+i).className='dot'+(i<pin.length?' on':'');}
function checkPin(){
  if(pin===staffPin){document.getElementById('pin-screen').style.display='none';document.getElementById('main').style.display='block';
    viewDate=todayKST();loadDay();pollTimer=setInterval(loadDay,5000);
  }else{document.getElementById('pin-err').textContent='Incorrect PIN';pin='';updDots();}
}
function logout(){if(pollTimer)clearInterval(pollTimer);pin='';updDots();document.getElementById('main').style.display='none';document.getElementById('pin-screen').style.display='flex';}

function todayKST(){const n=new Date();return new Date(n.getTime()+9*3600000).toISOString().slice(0,10);}
function shiftDate(days){const d=new Date(viewDate+'T00:00:00+09:00');d.setDate(d.getDate()+days);viewDate=d.toISOString().slice(0,10);viewTime='';loadDay();}

async function loadDay(){
  try{const r=await fetch('/api/reservations/'+viewDate);if(r.ok)resList=await r.json();}catch{}
  if(viewTime){try{const r=await fetch('/api/walkin/'+viewDate+'/'+viewTime);if(r.ok){const d=await r.json();walkinSeats=d.seats||[];}}catch{}}
  if(!viewTime&&resList.length>0){const times=[...new Set(resList.map(r=>r.time))].sort();viewTime=times[0]||'';}
  render();
}
async function toggleWalkin(seat){
  try{const r=await fetch('/api/walkin/toggle',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({date:viewDate,time:viewTime,seat})});
    if(r.ok){const d=await r.json();walkinSeats=d.seats||[];}
  }catch{}
  render();
}
function pickViewTime(t){viewTime=t;walkinSeats=[];loadDay();}

async function setStatus(id,status){
  const r=resList.find(x=>x.id===id);
  const name=r?r.name:'Guest';
  if(status==='seated'){
    if(!confirm(`${name}님이 착석했습니까?\nConfirm ${name} is seated?`))return;
  }else if(status==='noshow'){
    if(!confirm(`${name}님을 No Show 처리하겠습니까?\nMark ${name} as No Show?`))return;
  }
  await fetch('/api/reservations/'+id+'/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});
  loadDay();
}
async function cancelRes(id){
  const r=resList.find(x=>x.id===id);
  const name=r?r.name:'Guest';
  if(!confirm(`${name}님의 예약을 취소하겠습니까?\nCancel ${name}'s reservation?`))return;
  await fetch('/api/reservations/'+id,{method:'DELETE'});loadDay();
}

let editingId=null;
function startEdit(id){editingId=id;render();}
function cancelEdit(){editingId=null;render();}

async function saveEdit(id){
  const time=document.getElementById('edit-time-'+id)?.value;
  const size=parseInt(document.getElementById('edit-size-'+id)?.value);
  try{
    const r=await fetch('/api/reservations/'+id+'/edit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({time,partySize:size})});
    const d=await r.json();
    if(!r.ok){flash(d.error||'Failed to update');return;}
    flash('Reservation updated');
    editingId=null;loadDay();
  }catch{flash('Error updating');}
}

function genTimeOptions(selected){
  let opts='';
  for(let h=19;h<=25;h++){
    for(let m=0;m<60;m+=10){
      const hh=h>=24?h-24:h;
      const t=String(hh).padStart(2,'0')+':'+String(m).padStart(2,'0');
      opts+='<option value="'+t+'"'+(t===selected?' selected':'')+'>'+t+'</option>';
    }
  }
  return opts;
}

function flash(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',3500);}

function getSeatInfo(seatId){
  const res=resList.filter(r=>r.time===viewTime&&r.status!=='cancelled'&&r.status!=='noshow'&&(r.assignedSeats||[]).includes(seatId));
  return res[0]||null;
}

function drawFloor(){
  const taken=new Set();
  resList.filter(r=>r.time===viewTime&&r.status==='confirmed').forEach(r=>(r.assignedSeats||[]).forEach(s=>taken.add(s)));
  const takenMap={};
  resList.filter(r=>r.time===viewTime&&r.status==='confirmed').forEach(r=>(r.assignedSeats||[]).forEach(s=>{takenMap[s]=r;}));
  const wiSet=new Set(walkinSeats||[]);

  function seatRect(id,x,y,w,h){
    const t=taken.has(id);const wi=wiSet.has(id);const r=takenMap[id];
    const cls=t?'seat-taken':(wi?'seat-walkin':'seat-free');
    const click=t?'':(wi?`onclick="toggleWalkin('${id}')"`:`onclick="toggleWalkin('${id}')"`);
    return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" rx="4" class="'+cls+'" '+click+'/>'
      +'<text x="'+(x+w/2)+'" y="'+(y+h/2-2)+'" class="seat-label" dominant-baseline="central">'+id+'</text>'
      +(r?'<text x="'+(x+w/2)+'" y="'+(y+h/2+10)+'" class="seat-name" dominant-baseline="central">'+r.name.slice(0,4)+'</text>':'')
      +(wi&&!t?'<text x="'+(x+w/2)+'" y="'+(y+h/2+10)+'" class="seat-name" dominant-baseline="central" style="fill:#8bc48b;">walk-in</text>':'');
  }

  let svg='<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">';

  // Bar counter (curved)
  svg+='<rect class="bar-counter" x="60" y="140" width="480" height="60"/>';
  svg+='<text class="bar-label" x="300" y="175" dominant-baseline="central">BAR COUNTER</text>';

  // Bar seats (B1-B14 along the counter top)
  for(let i=0;i<14;i++){
    const x=72+i*34;
    svg+=seatRect('B'+(i+1), x, 95, 28, 36);
  }

  // Tables: T1-T4 (below bar, two rows)
  svg+=seatRect('T1', 80, 240, 80, 55);
  svg+=seatRect('T2', 180, 240, 80, 55);
  svg+=seatRect('T3', 280, 240, 80, 55);
  svg+=seatRect('T4', 380, 240, 80, 55);

  // High tables: H1-H2
  svg+=seatRect('H1', 80, 320, 60, 45);
  svg+=seatRect('H2', 160, 320, 60, 45);

  // Room
  svg+='<rect class="room-border" x="440" y="240" width="130" height="125"/>';
  svg+='<text class="bar-label" x="505" y="255" dominant-baseline="central" style="font-size:9px;">PRIVATE ROOM</text>';
  const roomTaken=taken.has('ROOM');const roomRes=takenMap['ROOM'];
  svg+='<rect x="460" y="270" width="90" height="50" rx="4" class="'+(roomTaken?'seat-taken':'seat-free')+'"/>';
  svg+='<text x="505" y="290" class="seat-label" dominant-baseline="central">ROOM</text>';
  if(roomRes)svg+='<text x="505" y="305" class="seat-name" dominant-baseline="central">'+roomRes.name.slice(0,6)+'</text>';

  // Labels for sections
  svg+='<text x="300" y="232" class="bar-label" dominant-baseline="central" style="font-size:9px;">4-PERSON TABLES</text>';
  svg+='<text x="130" y="312" class="bar-label" dominant-baseline="central" style="font-size:9px;">HIGH TABLES</text>';

  svg+='</svg>';
  return svg;
}

function render(){
  const body=document.getElementById('body');if(!body)return;
  const d=new Date(viewDate+'T00:00:00+09:00');
  const label=d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'Asia/Seoul'});
  const day=d.getDay();
  const slots=(day===5||day===6)?['19:00','20:00']:['19:00','20:00','21:00'];

  let h='<div class="date-nav"><button onclick="shiftDate(-1)">&larr;</button><div class="date-label">'+label+'</div><button onclick="shiftDate(1)">&rarr;</button></div>';

  // Staff add reservation button + form
  h+='<button style="width:100%;padding:12px;border:1px dashed rgba(184,147,90,.4);border-radius:8px;background:none;color:var(--gold);font-family:Cinzel,serif;font-size:11px;letter-spacing:.14em;cursor:pointer;margin-bottom:16px;" onclick="toggleAddForm()">+ ADD RESERVATION (STAFF)</button>';

  if(showAddForm){
    const d2=new Date(viewDate+'T00:00:00+09:00');const dy2=d2.getDay();
    const addSlots=(dy2===5||dy2===6)?['19:00','20:00']:['19:00','20:00','21:00'];
    h+='<div style="border:1px solid rgba(184,147,90,.25);border-radius:10px;padding:16px;margin-bottom:16px;background:rgba(240,235,224,.03);">';
    h+='<div style="font-family:Cinzel,serif;font-size:10px;letter-spacing:.16em;color:var(--amber);margin-bottom:12px;">MANUAL RESERVATION (NO DATE LIMIT)</div>';
    h+='<div style="display:flex;flex-direction:column;gap:10px;">';
    h+='<input id="add-date" type="date" value="'+viewDate+'" style="background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:10px 12px;color:var(--cream);font-size:14px;"/>';
    h+='<select id="add-time" style="background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:10px 12px;color:var(--cream);font-size:14px;">';
    h+=genTimeOptions(viewTime||'19:00');
    h+='</select>';
    h+='<div style="display:flex;gap:6px;">';
    ['bar','table','room'].forEach(z=>{h+='<button style="flex:1;padding:10px;border:1px solid '+(addZone===z?'var(--gold)':'rgba(184,147,90,.25)')+';border-radius:6px;background:'+(addZone===z?'var(--gold)':'none')+';color:'+(addZone===z?'var(--ink)':'var(--cream)')+';font-family:Cinzel,serif;font-size:11px;cursor:pointer;" onclick="setAddZone(\''+z+'\')">'+z.toUpperCase()+'</button>';});
    h+='</div>';
    h+='<div style="display:flex;gap:6px;">';
    for(let n=1;n<=8;n++){h+='<button style="width:36px;height:36px;border:1px solid '+(addSize===n?'var(--gold)':'rgba(184,147,90,.25)')+';border-radius:6px;background:'+(addSize===n?'var(--gold)':'none')+';color:'+(addSize===n?'var(--ink)':'var(--cream)')+';font-size:14px;cursor:pointer;" onclick="setAddSize('+n+')">'+n+'</button>';}
    h+='</div>';
    h+='<input id="add-name" placeholder="Guest name" style="background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:10px 12px;color:var(--cream);font-size:14px;"/>';
    h+='<input id="add-phone" type="tel" placeholder="Phone number" style="background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:10px 12px;color:var(--cream);font-size:14px;"/>';
    h+='<button id="add-btn" style="padding:14px;border:none;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--ink);font-family:Cinzel,serif;font-size:12px;letter-spacing:.1em;cursor:pointer;" onclick="staffAddReservation()">ADD RESERVATION</button>';
    h+='</div></div>';
  }

  // Time tabs
  h+='<div class="time-tabs">';
  slots.forEach(t=>{
    const count=resList.filter(r=>r.time===t&&r.status!=='cancelled'&&r.status!=='noshow').length;
    h+='<button class="time-tab'+(viewTime===t?' active':'')+'" onclick="pickViewTime(\''+t+'\')">'+t+'<span class="tab-count">'+count+' res</span></button>';
  });
  h+='</div>';

  // Floor layout
  if(viewTime){
    h+='<div class="floor"><div class="floor-title">FLOOR LAYOUT &middot; '+viewTime+'</div>'+drawFloor()+'</div>';
    h+='<div class="legend"><span><span class="legend-dot" style="background:rgba(184,147,90,.25);border:1px solid var(--gold);"></span> Reserved</span><span><span class="legend-dot" style="background:rgba(100,180,100,.2);border:1px solid rgba(100,180,100,.5);"></span> Walk-in</span><span><span class="legend-dot" style="background:rgba(240,235,224,.08);border:1px solid rgba(184,147,90,.2);"></span> Empty (tap to mark)</span></div>';
  }

  // Reservation list — active only (not seated/noshow/cancelled)
  const active=resList.filter(r=>(!viewTime||r.time===viewTime)&&r.status==='confirmed').sort((a,b)=>a.time.localeCompare(b.time));
  const completed=resList.filter(r=>(!viewTime||r.time===viewTime)&&(r.status==='seated'||r.status==='noshow')).sort((a,b)=>a.time.localeCompare(b.time));

  if(active.length===0){
    h+='<div class="empty-msg">No active reservations for this time slot.</div>';
  }else{
    h+='<div class="res-list">';
    active.forEach(r=>{
      const seats=(r.assignedSeats||[]).join(', ');
      const zn={bar:'Bar',table:'Table',room:'Room'}[r.zone]||r.zone;

      if(editingId===r.id){
        // Edit mode
        h+='<div class="res-card" style="flex-direction:column;gap:10px;border-color:var(--gold);">';
        h+='<div style="display:flex;align-items:center;gap:10px;width:100%;">';
        h+='<div class="res-time">'+r.time+'</div>';
        h+='<div class="res-info"><div class="res-name">'+r.name+'</div><div class="res-meta">'+r.phone+' · '+zn+' ('+seats+')</div></div>';
        h+='</div>';
        h+='<div style="display:flex;gap:8px;align-items:center;width:100%;">';
        h+='<label style="font-size:10px;color:var(--muted);min-width:35px;">Time</label>';
        h+='<select id="edit-time-'+r.id+'" style="flex:1;background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:8px;color:var(--cream);font-size:14px;">'+genTimeOptions(r.time)+'</select>';
        h+='</div>';
        h+='<div style="display:flex;gap:8px;align-items:center;width:100%;">';
        h+='<label style="font-size:10px;color:var(--muted);min-width:35px;">Size</label>';
        h+='<select id="edit-size-'+r.id+'" style="flex:1;background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;padding:8px;color:var(--cream);font-size:14px;">';
        for(let n=1;n<=10;n++){h+='<option value="'+n+'"'+(r.partySize===n?' selected':'')+'>'+n+' guests</option>';}
        h+='</select>';
        h+='</div>';
        h+='<div style="display:flex;gap:6px;width:100%;">';
        h+='<button style="flex:1;padding:10px;border:none;border-radius:6px;background:var(--gold);color:var(--ink);font-family:Cinzel,serif;font-size:11px;cursor:pointer;" onclick="saveEdit(\''+r.id+'\')">SAVE</button>';
        h+='<button style="flex:1;padding:10px;border:1px solid rgba(184,147,90,.25);border-radius:6px;background:none;color:var(--muted);font-size:11px;cursor:pointer;" onclick="cancelEdit()">CANCEL</button>';
        h+='</div></div>';
      }else{
        // Normal view
        h+='<div class="res-card" onclick="startEdit(\''+r.id+'\')" style="cursor:pointer;">';
        h+='<div class="res-time">'+r.time+'</div>';
        h+='<div class="res-info"><div class="res-name">'+r.name+'</div><div class="res-meta">'+r.partySize+' guests · '+r.phone+' · '+zn+'</div><div class="res-seats">'+seats+'</div></div>';
        h+='<div class="res-actions" onclick="event.stopPropagation();">';
        h+='<button class="btn-seat" onclick="setStatus(\''+r.id+'\',\'seated\')">SEATED</button>';
        h+='<button class="btn-noshow" onclick="setStatus(\''+r.id+'\',\'noshow\')">NO SHOW</button>';
        h+='<button class="btn-cancel-res" onclick="cancelRes(\''+r.id+'\')">✕</button>';
        h+='</div></div>';
      }
    });
    h+='</div>';
  }

  // History — seated/noshow (faded, read-only)
  if(completed.length>0){
    h+='<div style="margin-top:20px;display:flex;align-items:center;gap:10px;cursor:pointer;" onclick="showHist=!showHist;render()"><span style="font-family:Cinzel,serif;font-size:10px;letter-spacing:.16em;color:var(--muted);">COMPLETED ('+completed.length+')</span><div style="flex:1;height:1px;background:rgba(184,147,90,.1);"></div><span style="font-size:9px;color:var(--muted);">'+(showHist?'▲ HIDE':'▼ SHOW')+'</span></div>';
    if(showHist){
      h+='<div class="res-list">';
      completed.forEach(r=>{
        const seats=(r.assignedSeats||[]).join(', ');
        h+='<div class="res-card" style="opacity:.4;"><div class="res-time">'+r.time+'</div><div class="res-info"><div class="res-name">'+r.name+'</div><div class="res-meta">'+r.partySize+' guests · '+r.phone+' · '+seats+'</div></div>';
        h+='<span class="'+(r.status==='seated'?'badge-seated':'badge-noshow')+'">'+(r.status==='seated'?'SEATED':'NO SHOW')+'</span></div>';
      });
      h+='</div>';
    }
  }

  body.innerHTML=h;
}
</script>
</body>
</html>
