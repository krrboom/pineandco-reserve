<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pine &amp; Co — Staff</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#2a1a0e;--cream:#f5f0e6;--gold:#b8935a;--bg:#f0ebe0;--card:#fff;--brd:rgba(42,26,14,.1);--tx:#3d2e1f;--mu:#8a7560;--grn:#4a7c59;--red:#a33;--blu:#3a6ea5;}
*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;}
.w{max-width:900px;margin:0 auto;padding:16px;}.hd{text-align:center;margin-bottom:16px;}.hd h1{font-family:Cinzel,serif;font-size:16px;letter-spacing:.15em;color:var(--gold);font-weight:400;}
#login{text-align:center;padding:100px 20px;}#login input{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:14px;color:var(--tx);font-size:18px;text-align:center;width:160px;letter-spacing:.3em;outline:none;}
#login button{display:block;margin:12px auto 0;padding:12px 32px;border:none;border-radius:8px;background:var(--gold);color:#fff;font-family:Cinzel,serif;font-size:12px;cursor:pointer;}
.sb{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:8px 12px;background:var(--card);border:1px solid var(--brd);border-radius:8px;}
.sb label{font-size:12px;color:var(--mu);}.sb select{border:1px solid var(--brd);border-radius:4px;padding:4px 8px;font-size:13px;background:var(--bg);}
.vt{display:flex;gap:4px;margin-bottom:12px;}.vb{flex:1;padding:10px;border:1px solid var(--brd);border-radius:8px;background:var(--card);color:var(--mu);font-size:13px;cursor:pointer;text-align:center;}.vb.sel{border-color:var(--gold);color:var(--gold);font-weight:500;}
.cn{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px;}.cn button{background:var(--card);border:1px solid var(--brd);border-radius:6px;width:36px;height:36px;font-size:16px;cursor:pointer;color:var(--tx);}
.cn .ml{font-family:Cinzel,serif;font-size:15px;color:var(--gold);min-width:140px;text-align:center;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}.chd{text-align:center;font-size:11px;color:var(--mu);padding:6px 0;font-weight:500;}
.cc{background:var(--card);border:1px solid var(--brd);border-radius:6px;min-height:60px;padding:4px;cursor:pointer;transition:all .15s;position:relative;}
.cc:hover{border-color:var(--gold);}.cc.td{border-color:var(--gold);background:rgba(184,147,90,.06);}.cc.om{opacity:.3;pointer-events:none;}
.cc .dn{font-size:13px;font-weight:500;}.cc .dn.sun{color:var(--red);}.cc .dn.sat{color:var(--blu);}
.cc .rc{font-size:11px;color:var(--gold);font-weight:500;}.cc .ev{font-size:9px;color:var(--red);font-weight:500;}
.cc .evbtn{position:absolute;top:2px;right:2px;width:18px;height:18px;border:none;border-radius:3px;font-size:8px;cursor:pointer;background:rgba(0,0,0,.06);color:var(--mu);line-height:18px;text-align:center;opacity:0;transition:opacity .2s;}
.cc:hover .evbtn{opacity:1;}.cc .evbtn:hover{background:var(--red);color:#fff;}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}.dh .dt{font-family:Cinzel,serif;font-size:15px;color:var(--gold);}
.dh button{background:var(--card);border:1px solid var(--brd);border-radius:6px;padding:8px 16px;font-size:12px;cursor:pointer;color:var(--tx);}
.tt{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap;}.tb{padding:8px 16px;border:1px solid var(--brd);border-radius:6px;background:var(--card);color:var(--tx);font-size:13px;cursor:pointer;}.tb.sel{border-color:var(--gold);background:rgba(184,147,90,.1);color:var(--gold);font-weight:500;}
.tb .ct{font-size:10px;color:var(--mu);display:block;}
.fw{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:12px;margin-bottom:16px;overflow-x:auto;}.fw svg{font-family:'Noto Sans KR',sans-serif;}
.rc2{background:var(--card);border:1px solid var(--brd);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.rt{padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}.rt:hover{background:rgba(184,147,90,.03);}
.ri .nm{font-weight:500;color:var(--ink);font-size:14px;}.ri .mt{font-size:12px;color:var(--mu);margin-top:2px;}
.st{display:inline-block;font-size:10px;padding:1px 6px;border-radius:3px;margin-left:4px;}.so{background:#e3f0e8;color:var(--grn);}.si{background:#fce4ec;color:#c2185b;}.se{background:#e3f2fd;color:#1565c0;}.ss{background:#fff3e0;color:#e65100;}
.ra{display:flex;gap:4px;}.ra button{padding:6px 10px;border:none;border-radius:4px;font-size:11px;cursor:pointer;}.bs{background:var(--grn);color:#fff;}.bn{background:var(--red);color:#fff;}.bd{background:rgba(0,0,0,.06);color:var(--mu);}
.rd{display:none;padding:0 12px 12px;border-top:1px solid var(--brd);}.rd.open{display:block;}
.dr{display:flex;gap:8px;margin-bottom:6px;font-size:12px;align-items:flex-start;}.dr label{color:var(--mu);min-width:65px;padding-top:4px;}
.dr span,.dr select,.dr textarea{flex:1;color:var(--tx);}.dr textarea{border:1px solid var(--brd);border-radius:4px;padding:6px;font-size:12px;resize:vertical;min-height:36px;font-family:'Noto Sans KR',sans-serif;background:var(--bg);}
.dr select{border:1px solid var(--brd);border-radius:4px;padding:4px 6px;font-size:12px;background:var(--bg);}
.ml2{font-size:11px;color:var(--mu);margin-top:6px;line-height:1.6;}
.at{display:block;width:100%;padding:12px;border:1px dashed rgba(42,26,14,.15);border-radius:8px;background:var(--card);color:var(--mu);font-size:12px;cursor:pointer;margin-bottom:12px;}
.af{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:16px;display:none;margin-bottom:16px;}.af.open{display:block;}
.af input,.af select,.af textarea{width:100%;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:10px;color:var(--tx);font-size:13px;margin-bottom:8px;outline:none;font-family:'Noto Sans KR',sans-serif;}
.af .row{display:flex;gap:8px;}.af .row>*{flex:1;}
.asb{width:100%;padding:12px;border:none;border-radius:6px;background:var(--gold);color:#fff;font-family:Cinzel,serif;font-size:12px;letter-spacing:.1em;cursor:pointer;margin-top:4px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);border-radius:8px;font-size:12px;padding:10px 20px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;}.toast.show{opacity:1;}
</style></head><body>
<div class="w"><div class="hd"><h1>PINE &amp; CO — RESERVATIONS</h1></div>
<div id="login"><input type="password" id="pin" placeholder="PIN" maxlength="4" onkeydown="if(event.key==='Enter')doLogin()"/><button onclick="doLogin()">ENTER</button></div>
<div id="dash" style="display:none">
<div class="sb"><label>담당 직원:</label><select id="stSel"></select></div>
<div class="vt"><button class="vb sel" id="tH" onclick="sv('home')">🏠 Today</button><button class="vb" id="tC" onclick="sv('cal')">📅 Calendar</button><button class="vb" id="tD" onclick="sv('day')">📋 Day View</button><button class="vb" onclick="location.href='bookings.html'">📋 예약관리</button><button class="vb" id="tS" onclick="sv('set')">⚙️</button></div>
<!-- HOME / TODAY VIEW -->
<div id="vHome">
<div id="todaySummary"></div>
</div>
<div id="vCal" style="display:none"><div class="cn"><button onclick="sm(-1)">&larr;</button><div class="ml" id="mL"></div><button onclick="sm(1)">&rarr;</button></div><div class="cg" id="cG"></div></div>
<div id="vDay" style="display:none">
<div class="dh"><button onclick="sv('cal')">&larr; Calendar</button><div class="dt" id="dT"></div><div></div></div>
<div class="tt" id="tT"></div><div class="fw" id="fW"></div><div id="rL"></div>
<button class="at" onclick="document.getElementById('aF').classList.toggle('open')">+ STAFF ADD RESERVATION</button>
<div class="af" id="aF">
<div class="row"><input type="date" id="aD"/><select id="aTm"><option value="19:00">19:00</option><option value="20:00">20:00</option><option value="21:00">21:00</option><option value="23:00">23:00</option></select></div>
<div class="row"><input type="text" id="aN" placeholder="Guest name"/><input type="tel" id="aPh" placeholder="Phone"/></div>
<div class="row"><input type="text" id="aIg" placeholder="Instagram @"/><input type="email" id="aEm" placeholder="Email"/></div>
<div class="row"><select id="aSz"></select><select id="aSrc"><option value="staff">직원 직접</option><option value="email">Email</option><option value="instagram">Instagram</option><option value="phone">전화</option></select></div>
<div class="row"><select id="aZn"><option value="bar">Bar</option><option value="table">Table</option><option value="highTable">High Table</option><option value="room">Room</option></select><input type="text" id="aSt" placeholder="Seats (B1,B2/T1/ROOM)"/></div>
<textarea id="aNt" placeholder="특이사항 / Notes" rows="2"></textarea>
<button class="asb" onclick="sadd()">ADD RESERVATION</button>
</div></div>
<!-- SETTINGS VIEW -->
<div id="vSet" style="display:none">
<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:16px;margin-bottom:12px;">
<h2 style="font-family:Cinzel,serif;font-size:14px;color:var(--gold);font-weight:400;margin-bottom:12px;">직원 관리 / Staff Management 🔒</h2>
<div id="adminLock">
<div style="font-size:12px;color:var(--mu);margin-bottom:8px;">관리자 비밀번호를 입력하세요:</div>
<div style="display:flex;gap:8px;">
<input type="password" id="adminPin" placeholder="Admin PIN" maxlength="4" style="flex:1;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;font-size:14px;text-align:center;letter-spacing:.2em;color:var(--tx);outline:none;"/>
<button onclick="unlockAdmin()" style="padding:8px 16px;border:none;border-radius:6px;background:var(--gold);color:#fff;font-size:12px;cursor:pointer;">확인</button>
</div>
</div>
<div id="adminArea" style="display:none;">
<div id="staffList"></div>
<div style="display:flex;gap:8px;margin-top:10px;">
<input type="text" id="newStaffName" placeholder="새 직원 이름" style="flex:1;background:var(--bg);border:1px solid var(--brd);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--tx);outline:none;"/>
<button onclick="addStaff()" style="padding:8px 16px;border:none;border-radius:6px;background:var(--gold);color:#fff;font-size:12px;cursor:pointer;">추가</button>
</div>
</div>
</div>
<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:16px;margin-bottom:12px;">
<h2 style="font-family:Cinzel,serif;font-size:14px;color:var(--gold);font-weight:400;margin-bottom:12px;">이벤트 / 대관 관리</h2>
<p style="font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:10px;">📅 Calendar 탭에서 날짜 위에 마우스를 올리면 우측 상단에 <strong style="color:var(--red);">E</strong> 버튼이 나타납니다.<br>클릭하면 이벤트명을 입력할 수 있고, 해당 날짜의 예약이 차단됩니다.</p>
<div id="eventList"></div>
</div>
<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:16px;margin-bottom:12px;">
<h2 style="font-family:Cinzel,serif;font-size:14px;color:var(--gold);font-weight:400;margin-bottom:12px;">📅 Google Calendar 연동</h2>
<p style="font-size:12px;color:var(--mu);line-height:1.6;margin-bottom:10px;">구글 캘린더에 있는 예약을 시스템으로 가져옵니다.<br>매 1시간마다 자동 동기화되며, 아래 버튼으로 수동 동기화도 가능합니다.</p>
<button onclick="gcalSync(false)" style="padding:10px 20px;border:none;border-radius:6px;background:var(--gold);color:#fff;font-size:12px;cursor:pointer;">🔄 동기화</button>
<button onclick="gcalSync(true)" style="padding:10px 20px;border:none;border-radius:6px;background:rgba(170,51,51,.8);color:#fff;font-size:12px;cursor:pointer;margin-left:4px;">🔄 전체 다시</button>
<button onclick="gcalTest()" style="padding:10px 20px;border:none;border-radius:6px;background:rgba(58,110,165,.8);color:#fff;font-size:12px;cursor:pointer;margin-left:4px;">🔍 진단</button>
<button onclick="gcalReport()" style="padding:10px 20px;border:none;border-radius:6px;background:rgba(0,0,0,.3);color:#fff;font-size:12px;cursor:pointer;margin-left:4px;">📊 비교</button>
<div id="gcalStatus" style="font-size:12px;color:var(--mu);margin-top:8px;"></div>
<div id="gcalReportArea" style="margin-top:12px;"></div>
</div>
</div></div></div>
<div class="toast" id="toast"></div>
<script>
var pin='',cD='',cT='',cY,cM,aR=[],av={},evts={},exId=null;
var DK=['일','월','화','수','목','금','토'],MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
function kst(){return new Date(Date.now()+9*3600000);}function ktd(){return kst().toISOString().slice(0,10);}
function fl(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},3000);}
function gs(){return document.getElementById('stSel').value||'Staff';}

async function doLogin(){
pin=document.getElementById('pin').value;if(pin.length!==4){fl('4자리 PIN');return;}
var sn=await fetch('/api/staff-names').then(function(r){return r.json();}).catch(function(){return ['Staff'];});
document.getElementById('stSel').innerHTML=sn.map(function(n){return '<option>'+n+'</option>';}).join('');
var as=document.getElementById('aSz');as.innerHTML='';for(var i=1;i<=10;i++)as.innerHTML+='<option value="'+i+'">'+i+'명</option>';
evts=await fetch('/api/events').then(function(r){return r.json();}).catch(function(){return {};});
var n=kst();cY=n.getFullYear();cM=n.getMonth();cD=ktd();
document.getElementById('login').style.display='none';document.getElementById('dash').style.display='block';
loadHome();
}
function sv(v){
document.getElementById('vHome').style.display=v==='home'?'block':'none';
document.getElementById('vCal').style.display=v==='cal'?'block':'none';
document.getElementById('vDay').style.display=v==='day'?'block':'none';
document.getElementById('vSet').style.display=v==='set'?'block':'none';
document.getElementById('tH').className='vb'+(v==='home'?' sel':'');
document.getElementById('tC').className='vb'+(v==='cal'?' sel':'');
document.getElementById('tD').className='vb'+(v==='day'?' sel':'');
document.getElementById('tS').className='vb'+(v==='set'?' sel':'');
if(v==='home')loadHome();if(v==='cal')lc();if(v==='day')ld();if(v==='set')loadSettings();
}
// ── New Bookings: Reservations received today ──
async function loadNew(){
var newRes=await fetch('/api/new-today').then(function(r){return r.json();}).catch(function(){return [];});
var el=document.getElementById('newBookings');
var today=ktd();
var h='';

h+='<div style="text-align:center;margin-bottom:16px;">';
h+='<div style="font-family:Cinzel,serif;font-size:16px;color:var(--gold);">📩 오늘 들어온 예약</div>';
h+='<div style="font-size:12px;color:var(--mu);margin-top:4px;">'+today+' 기준 · 총 '+newRes.length+'건</div>';
h+='</div>';

if(!newRes.length){
h+='<div style="text-align:center;color:var(--mu);padding:40px;background:var(--card);border:1px solid var(--brd);border-radius:8px;">오늘 들어온 예약이 없습니다.</div>';
el.innerHTML=h;return;
}

// Sort by reservation date
newRes.sort(function(a,b){return (a.date+a.time)<(b.date+b.time)?-1:1;});

var sl={online:'Online',instagram:'Instagram',email:'Email',staff:'직원',phone:'전화',google_calendar:'GCal'};
var sc={online:'so',instagram:'si',email:'se',staff:'ss',phone:'ss',google_calendar:'so'};
var zn={bar:'Bar',table:'Table',highTable:'High Table',room:'Room',unassigned:'미배정'};

// Stats
var withNotes=newRes.filter(function(r){return r.notes&&r.notes.trim();}).length;
var needsAssign=newRes.filter(function(r){return r.status==='needs_assignment';}).length;

if(needsAssign>0){
h+='<div style="background:rgba(170,51,51,.06);border:1px solid rgba(170,51,51,.15);border-radius:8px;padding:12px;margin-bottom:12px;text-align:center;">';
h+='<div style="color:var(--red);font-weight:500;font-size:13px;">🚨 좌석 미배정 '+needsAssign+'건 — 수동 배정 필요!</div></div>';
}

if(withNotes>0){
h+='<div style="background:rgba(184,147,90,.06);border:1px solid rgba(184,147,90,.15);border-radius:8px;padding:12px;margin-bottom:12px;text-align:center;">';
h+='<div style="color:var(--gold);font-size:13px;">📝 특이사항 있는 예약: '+withNotes+'건</div></div>';
}

newRes.forEach(function(r){
var hasNotes=r.notes&&r.notes.trim()&&!r.notes.startsWith('📅 Google');
var isUnassigned=r.status==='needs_assignment';
var borderColor=isUnassigned?'var(--red)':(hasNotes?'var(--gold)':'var(--brd)');
var bgColor=isUnassigned?'rgba(170,51,51,.03)':(hasNotes?'rgba(184,147,90,.03)':'var(--card)');

h+='<div style="background:'+bgColor+';border:1px solid '+borderColor+';border-radius:8px;padding:14px;margin-bottom:8px;">';

// Header row
h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">';
h+='<div>';
h+='<div style="font-weight:500;font-size:14px;color:var(--ink);">'+r.name+' · '+r.partySize+'명</div>';
h+='<div style="font-size:12px;color:var(--mu);margin-top:2px;">';
h+='📅 <strong>'+r.date+'</strong> '+r.time+' · '+(zn[r.zone]||r.zone);
if(r.seats&&r.seats.length)h+=' ('+r.seats.join(',')+')';
h+=' <span class="st '+(sc[r.source]||'ss')+'">'+(sl[r.source]||r.source)+'</span>';
h+='</div></div>';

if(isUnassigned)h+='<div style="color:var(--red);font-size:11px;font-weight:500;padding:3px 8px;border:1px solid var(--red);border-radius:4px;">🚨 미배정</div>';
h+='</div>';

// Contact info
h+='<div style="font-size:12px;color:var(--mu);margin-bottom:6px;">';
if(r.phone)h+='📱 '+r.phone+' ';
if(r.email)h+='📧 '+r.email+' ';
if(r.instagram)h+='📷 '+r.instagram;
if(!r.phone&&!r.email&&!r.instagram)h+='연락처 없음';
h+='</div>';

// Special request / Notes - PROMINENT
if(r.notes&&r.notes.trim()){
var displayNotes=r.notes;
// Clean up Google Calendar prefix for readability
displayNotes=displayNotes.replace(/^📅 Google Calendar: /,'📅 ');
h+='<div style="background:rgba(184,147,90,.06);border-left:3px solid var(--gold);padding:8px 12px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.6;color:var(--tx);white-space:pre-wrap;">'+displayNotes+'</div>';
}

// Created time
var created=r.createdAt?r.createdAt.slice(11,16):'';
h+='<div style="font-size:10px;color:var(--mu);margin-top:6px;text-align:right;">접수: '+created+'</div>';

h+='</div>';
});

el.innerHTML=h;
}

// ── Home: Today's Overview ──
async function loadHome(){
var today=ktd();
var todayRes=await fetch('/api/reservations/'+today).then(function(r){return r.json();}).catch(function(){return [];});
var todayAvail=await fetch('/api/availability/'+today).then(function(r){return r.json();}).catch(function(){return {};});

var el=document.getElementById('todaySummary');
var d=new Date(today+'T12:00:00');
var h='';

// Header
h+='<div style="text-align:center;margin-bottom:16px;">';
h+='<div style="font-family:Cinzel,serif;font-size:18px;color:var(--gold);font-weight:400;">'+today+' ('+DK[d.getDay()]+')</div>';
h+='<div style="font-size:12px;color:var(--mu);margin-top:4px;">Pine &amp; Co Seoul</div>';
h+='</div>';

// Event check
if(todayAvail.blocked){
h+='<div style="background:rgba(170,51,51,.08);border:1px solid rgba(170,51,51,.2);border-radius:8px;padding:16px;text-align:center;margin-bottom:12px;">';
h+='<div style="font-size:14px;color:var(--red);font-weight:500;">🚫 EVENT DAY — '+todayAvail.event+'</div></div>';
el.innerHTML=h;return;
}

var active=todayRes.filter(function(r){return r.status==='confirmed'||r.status==='seated';});
var newToday=todayRes.filter(function(r){return r.createdAt&&r.createdAt.startsWith(today);});

// Stats cards
h+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px;">';

}

if(!confirm(d+' 이벤트를 해제할까요?'))return;
await fetch('/api/events/'+d,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin,label:''})});
evts=await fetch('/api/events').then(function(r){return r.json();}).catch(function(){return {};});
renderEventList();fl('이벤트 해제: '+d);
}

async function gcalSync(force){
document.getElementById('gcalStatus').innerHTML=(force?'⚠️ 기존 캘린더 예약 삭제 후 전체 다시 가져오는 중...':'동기화 중...');
var r=await fetch('/api/gcal-sync',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin,force:!!force})}).then(function(r){return r.json();}).catch(function(){return {error:'Network error'};});
if(r.ok){
  var msg='✅ 완료! 추가: <strong>'+r.added+'건</strong> (캘린더: '+r.total+'건, 시스템: '+r.reservationCount+'건)';
  if(r.warnings&&r.warnings.length>0){
    msg+='<div style="margin-top:8px;padding:8px;background:rgba(170,51,51,.06);border:1px solid rgba(170,51,51,.15);border-radius:4px;font-size:11px;line-height:1.6;">';
    msg+='<strong style="color:var(--red);">⚠️ ('+r.warnings.length+'건):</strong><br>';
    r.warnings.forEach(function(w){msg+=w+'<br>';});
    msg+='</div>';
  }
  document.getElementById('gcalStatus').innerHTML=msg;
}
else document.getElementById('gcalStatus').innerHTML='❌ '+(r.error||'실패');
}

async function gcalTest(){
document.getElementById('gcalStatus').innerHTML='🔍 Google Calendar 연결 진단 중...';
var r=await fetch('/api/gcal-test',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})}).then(function(r){return r.json();}).catch(function(){return {error:'Network error'};});
var h='<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-top:8px;font-size:12px;line-height:1.8;">';
h+='<strong>📊 진단 결과:</strong><br>';
if(r.diag){
h+='환경변수 EMAIL: '+(r.diag.hasEmail?'✅':'❌')+' '+r.diag.email+'<br>';
h+='환경변수 KEY: '+(r.diag.hasKey?'✅ ('+r.diag.keyLength+'자)':'❌')+'<br>';
h+='환경변수 CAL_ID: '+(r.diag.hasCalId?'✅':'❌')+' '+r.diag.calId+'<br>';
if(r.diag.keyHasNewlines!==undefined)h+='KEY 줄바꿈: '+(r.diag.keyHasNewlines?'✅':'❌ 줄바꿈 없음!')+'<br>';
}
if(r.ok){
h+='<br><strong style="color:var(--grn);">✅ 연결 성공!</strong><br>';
h+='캘린더 이벤트: <strong>'+r.totalEvents+'</strong>건<br>';
h+='이미 시스템에 있음: <strong>'+r.alreadyImported+'</strong>건<br>';
h+='<strong style="color:var(--red);">아직 안 들어감: '+r.notImported+'건</strong><br>';
if(r.notImportedList&&r.notImportedList.length>0){
h+='<br><strong style="color:var(--red);">❌ 누락된 예약:</strong><br>';
r.notImportedList.forEach(function(x){h+='• '+x.date+' <strong>'+x.title+'</strong><br>';});
h+='<br>→ <strong>"🔄 전체 다시"</strong> 버튼을 눌러서 전체 재동기화하세요!';
}
if(r.alreadyImportedList&&r.alreadyImportedList.length>0){
h+='<br><br>✅ 이미 들어간 예약:<br>';
r.alreadyImportedList.forEach(function(x){h+='• '+x.date+' '+x.title+'<br>';});
}
}else{
h+='<br><strong style="color:var(--red);">❌ 연결 실패: '+r.error+'</strong>';
}
h+='</div>';
document.getElementById('gcalStatus').innerHTML=h;
}

async function gcalReport(){
document.getElementById('gcalReportArea').innerHTML='<div style="color:var(--mu);padding:8px;">확인 중...</div>';
var r=await fetch('/api/gcal-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({pin:pin})}).then(function(r){return r.json();}).catch(function(){return {error:'Network error'};});
if(!r.ok){document.getElementById('gcalReportArea').innerHTML='<div style="color:var(--red);">❌ '+(r.error||'Error')+'</div>';return;}
var h='<div style="background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:12px;margin-top:8px;">';
h+='<div style="font-size:13px;font-weight:500;margin-bottom:8px;">📊 Google Calendar ↔ 시스템 비교</div>';
h+='<div style="display:flex;gap:12px;margin-bottom:12px;font-size:12px;">';
h+='<span>캘린더: <strong>'+r.total+'</strong>건</span>';
h+='<span style="color:var(--grn);">✅ 연동됨: <strong>'+r.imported+'</strong></span>';
h+='<span style="color:var(--red);">❌ 미연동: <strong>'+r.missing+'</strong></span>';
h+='</div>';
if(r.missing>0){
h+='<div style="background:rgba(170,51,51,.04);border:1px solid rgba(170,51,51,.12);border-radius:6px;padding:8px;margin-bottom:8px;">';
h+='<div style="font-size:11px;color:var(--red);font-weight:500;margin-bottom:6px;">❌ 시스템에 없는 예약 (동기화 버튼을 눌러주세요!):</div>';
r.report.filter(function(x){return !x.imported;}).forEach(function(x){
h+='<div style="font-size:11px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.04);">';
h+='<strong>'+x.title+'</strong> · '+x.date;
h+=' → 이름:'+x.parsed.name+' / 시간:'+(x.parsed.time||'?')+' / '+x.parsed.partySize+'명';
if(x.parsed.phone)h+=' / 📱'+x.parsed.phone;
if(x.parsed.instagram)h+=' / '+x.parsed.instagram;
h+='</div>';
});
h+='</div>';
}
h+='<div style="max-height:300px;overflow-y:auto;">';
h+='<div style="font-size:11px;color:var(--mu);margin-bottom:4px;">전체 목록:</div>';
r.report.forEach(function(x){
var color=x.imported?'var(--grn)':'var(--red)';
var icon=x.imported?'✅':'❌';
h+='<div style="font-size:11px;padding:3px 0;border-bottom:1px solid rgba(0,0,0,.03);display:flex;gap:4px;">';
h+='<span style="color:'+color+';">'+icon+'</span>';
h+='<span style="flex:1;"><strong>'+x.title+'</strong> · '+x.date+'</span>';
if(x.imported)h+='<span style="color:var(--mu);">'+(x.systemStatus||'')+'</span>';
h+='</div>';
});
h+='</div></div>';
document.getElementById('gcalReportArea').innerHTML=h;
}
</script></body></html>
