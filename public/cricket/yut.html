<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>크리켓 윷놀이 · Cricket Yut</title>
<style>
:root{--paper:#f0ebe0;--paper2:#fafaf7;--ink:#2b1a0a;--ink2:#4a3319;--mut:#6d5334;
 --gold:#b8935a;--dark:#1e1208;--line:#38291a2e}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{background:var(--dark);font-family:"Iowan Old Style","Times New Roman",serif;color:var(--ink);overscroll-behavior:none}
.kr{font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif}
.app{max-width:560px;margin:0 auto;min-height:100vh;background:var(--paper);position:relative}
.top{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--dark);color:#e9e1d1}
.top img{height:26px;filter:brightness(0) invert(1) opacity(.92)}
.top .ti{font-variant-caps:small-caps;letter-spacing:.16em;font-size:12px;color:var(--gold)}
.top .back{margin-left:auto;font-size:12px;color:#c8ba9f;text-decoration:none;border:1px solid rgba(216,178,90,.4);
 border-radius:999px;padding:5px 12px}

/* 설정 */
.setup{padding:20px 16px 30px}
.h1{text-align:center;font-variant-caps:small-caps;letter-spacing:.14em;font-size:22px}
.h2{text-align:center;font-size:12.5px;color:var(--mut);margin-top:5px}
.rule{width:44px;height:1px;background:var(--gold);margin:11px auto 18px}
.lab{font-size:12px;color:var(--mut);margin:16px 0 7px}
.pcs{display:flex;gap:8px}
.pcs button{flex:1;padding:12px 0;border:1px solid var(--line);background:var(--paper2);border-radius:10px;
 font-size:15px;color:var(--ink2);cursor:pointer;font-family:inherit}
.pcs button.on{background:var(--dark);color:#f0e6d2;border-color:var(--dark)}
.names{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.nrow{display:flex;align-items:center;gap:10px;background:var(--paper2);border:1px solid var(--line);
 border-radius:10px;padding:9px 12px}
.dot{width:15px;height:15px;border-radius:50%;flex:0 0 auto}
.nrow input{flex:1;border:none;background:none;font-size:15px;color:var(--ink);font-family:inherit;outline:none;min-width:0}
.go{display:block;width:100%;margin-top:22px;padding:15px;border:none;border-radius:12px;background:var(--dark);
 color:#f0e6d2;font-size:16px;letter-spacing:.1em;font-variant-caps:small-caps;cursor:pointer}
.hint{text-align:center;font-size:11px;color:var(--mut);margin-top:14px;line-height:1.75}

/* 게임 */
#game{display:none;padding:0 12px 26px}
.turn{display:flex;align-items:center;gap:9px;padding:11px 4px 9px}
.turn .dot{width:18px;height:18px}
.turn .tn{font-size:17px}
.turn .tsub{margin-left:auto;font-size:11.5px;color:var(--mut)}
svg#board{width:100%;height:auto;display:block;background:var(--paper2);border:1px solid var(--line);border-radius:14px}
.throwbox{margin-top:12px;text-align:center}
.sticks{display:flex;gap:7px;justify-content:center;height:56px;align-items:center}
.stick{width:15px;height:52px;border-radius:7px;border:1px solid #00000022;transition:transform .12s}
.stick.up{background:#efe4cd}
.stick.dn{background:#6d4b28}
.rlabel{font-size:22px;margin-top:6px;min-height:30px;letter-spacing:.06em}
.rlabel small{font-size:12.5px;color:var(--mut);letter-spacing:0;margin-left:6px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;background:var(--dark);color:#f0e6d2;font-size:16px;
 letter-spacing:.08em;font-variant-caps:small-caps;cursor:pointer;margin-top:10px;font-family:inherit}
.btn:disabled{opacity:.32}
.chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:11px;min-height:36px}
.chip{border:1px solid var(--gold);background:#fff;color:var(--ink);border-radius:999px;padding:8px 14px;
 font-size:13px;cursor:pointer;font-family:-apple-system,"Apple SD Gothic Neo",sans-serif}
.chip:active{background:var(--gold);color:#fff}
.log{margin-top:12px;font-size:12px;color:var(--mut);text-align:center;min-height:20px;line-height:1.6}
.scores{display:flex;gap:7px;margin-top:12px}
.sc{flex:1;border:1px solid var(--line);border-radius:10px;padding:8px 4px;text-align:center;background:var(--paper2)}
.sc.cur{border-color:var(--gold);background:#fff}
.sc .sn{font-size:11.5px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc .sv{font-size:13px;color:var(--gold);margin-top:2px}

.win{position:fixed;inset:0;background:rgba(16,10,4,.93);display:none;align-items:center;justify-content:center;padding:20px;z-index:40}
.win.on{display:flex}
.winin{background:var(--paper);border-radius:16px;padding:26px 20px;max-width:330px;width:100%;text-align:center}
.winin .wl{font-size:12px;color:var(--mut);letter-spacing:.1em}
.winin .wn{font-size:26px;margin:5px 0 4px}
.winin .wsub{font-size:13px;color:var(--ink2)}
.winin .pen{margin-top:14px;font-size:13px;color:#8a3b2a;background:#8a3b2a14;border:1px dashed #8a3b2a55;border-radius:8px;padding:9px}
.winin button{margin-top:16px;width:100%;padding:13px;border:none;border-radius:10px;background:var(--dark);color:#f0e6d2;
 font-size:15px;cursor:pointer;font-family:inherit}
.winin .b2{background:none;color:var(--mut);border:1px solid var(--line);margin-top:8px}
</style>

<div class="app">
 <div class="top">
  <img src="logo.png" alt="Cricket Seoul"><span class="ti">Yut</span>
  <a class="back" href="index.html">← 메뉴</a>
 </div>

 <div class="setup" id="setup">
  <div class="h1">Cricket Yut</div>
  <div class="h2 kr">한 사람당 말 두 개. 둘 다 들어오면 이깁니다.</div>
  <div class="rule"></div>
  <div class="lab kr">몇 명이 하나요</div>
  <div class="pcs" id="pcs">
   <button data-n="2">2명</button><button data-n="3">3명</button><button data-n="4" class="on">4명</button>
  </div>
  <div class="lab kr">이름</div>
  <div class="names" id="names"></div>
  <button class="go" id="start">시작</button>
  <div class="hint kr">윷·모가 나오면 한 번 더 던집니다.<br>남의 말을 잡아도 한 번 더.<br>내 말끼리 만나면 업고 같이 갑니다.</div>
 </div>

 <div id="game">
  <div class="turn"><span class="dot" id="tdot"></span><span class="tn kr" id="tname">—</span>
   <span class="tsub kr" id="tsub"></span></div>
  <svg id="board" viewBox="0 0 500 500"></svg>
  <div class="throwbox">
   <div class="sticks" id="sticks"></div>
   <div class="rlabel kr" id="rlabel">&nbsp;</div>
   <button class="btn" id="throw">윷 던지기</button>
   <div class="chips" id="chips"></div>
   <div class="log kr" id="log">&nbsp;</div>
  </div>
  <div class="scores" id="scores"></div>
 </div>
</div>

<div class="win" id="winbox"><div class="winin">
 <div class="wl kr">우승</div>
 <div class="wn kr" id="winner">—</div>
 <div class="wsub kr" id="wsub"></div>
 <div class="pen kr" id="wpen"></div>
 <button id="again">한 판 더</button>
 <button class="b2" id="again2">사람 다시 정하기</button>
</div></div>

<script>
/* ===== 판 ===== */
const P={}; // 노드 좌표
const OUT=[];
(function build(){
 const BR=[440,440],TR=[440,60],TL=[60,60],BL=[60,440];
 for(let i=0;i<4;i++){OUT.push("o"+i);P["o"+i]=[440,440-76*(i+1)];}      // 우변
 OUT.push("o4");P.o4=TR;
 for(let i=0;i<4;i++){OUT.push("o"+(5+i));P["o"+(5+i)]=[440-76*(i+1),60];} // 상변
 OUT.push("o9");P.o9=TL;
 for(let i=0;i<4;i++){OUT.push("o"+(10+i));P["o"+(10+i)]=[60,60+76*(i+1)];}// 좌변
 OUT.push("o14");P.o14=BL;
 for(let i=0;i<4;i++){OUT.push("o"+(15+i));P["o"+(15+i)]=[60+76*(i+1),440];}// 하변
 P.a0=[377,123];P.a1=[313,187];P.ca=[250,250];P.a2=[187,313];P.a3=[123,377];
 P.b0=[123,123];P.b1=[187,187];P.cb=[250,250];P.d0=[313,313];P.d1=[377,377];
 P.START=BR;
})();
const NEXT={};
for(let i=0;i<18;i++)NEXT["o"+i]="o"+(i+1);
NEXT.o18="FIN";
NEXT.HOME="o0";
Object.assign(NEXT,{a0:"a1",a1:"ca",ca:"a2",a2:"a3",a3:"o14",b0:"b1",b1:"cb",cb:"d0",d0:"d1",d1:"FIN"});
/* 정확히 멈췄을 때만 타는 지름길 */
const BRANCH={o4:"a0",o9:"b0",ca:"d0"};
/* 방(중앙)은 두 대각선이 겹치는 같은 자리 */
function sq(n){return (n==="ca"||n==="cb")?"CEN":n;}
function advance(node,steps){
 let cur=node,first=true;
 for(let i=0;i<steps;i++){
  const nx=(first&&BRANCH[cur]!==undefined)?BRANCH[cur]:NEXT[cur];
  first=false;
  if(nx===undefined||nx==="FIN")return "FIN";
  cur=nx;
 }
 return cur;
}
/* 남은 거리(순위 표시용) */
function distLeft(n){
 if(n==="FIN")return 0;
 let c=n,d=0,g=0;
 while(c!=="FIN"&&g++<40){c=(g===1&&BRANCH[c]!==undefined)?BRANCH[c]:NEXT[c];d++;if(c===undefined)break;}
 return d;
}

/* ===== 참가자 ===== */
const COLORS=["#b8935a","#5a8a5e","#8a3b2a","#3d5a80"];
const DEF=["참가자 1","참가자 2","참가자 3","참가자 4"];
let nP=4, players=[], turn=0, pending=0, throwsLeft=0, busy=false;

const namesEl=document.getElementById("names");
function buildNames(){
 namesEl.innerHTML="";
 for(let i=0;i<nP;i++){
  const d=document.createElement("div");d.className="nrow";
  d.innerHTML='<span class="dot" style="background:'+COLORS[i]+'"></span>'+
    '<input class="kr" value="'+(players[i]&&players[i].name||DEF[i])+'" maxlength="8">';
  namesEl.appendChild(d);
 }
}
document.querySelectorAll("#pcs button").forEach(b=>b.onclick=()=>{
 document.querySelectorAll("#pcs button").forEach(x=>x.classList.toggle("on",x===b));
 nP=+b.dataset.n; buildNames();
});
buildNames();

document.getElementById("start").onclick=()=>{
 const ins=[...namesEl.querySelectorAll("input")];
 players=ins.map((el,i)=>({name:(el.value||DEF[i]).trim()||DEF[i],color:COLORS[i],
   pieces:[{node:"HOME"},{node:"HOME"}]}));
 turn=0;pending=0;throwsLeft=1;busy=false;
 document.getElementById("setup").style.display="none";
 document.getElementById("game").style.display="block";
 document.getElementById("winbox").classList.remove("on");
 setLabel("");log("윷을 던지세요");
 drawBoard();syncTurn();chipsEl.innerHTML="";
};

/* ===== 판 그리기 ===== */
const board=document.getElementById("board");
const chipsEl=document.getElementById("chips");
function drawBoard(){
 let s='<rect x="0" y="0" width="500" height="500" fill="none"/>';
 // 사각 테두리 + 대각선
 s+='<path d="M60 60 H440 V440 H60 Z" fill="none" stroke="#38291a30" stroke-width="2"/>';
 s+='<path d="M440 60 L60 440 M60 60 L440 440" fill="none" stroke="#38291a24" stroke-width="2"/>';
 // 크리켓 로고 (방)
 s+='<circle cx="250" cy="250" r="46" fill="#fff" stroke="#b8935a" stroke-width="2"/>';
 s+='<image href="logo.png" x="211" y="222" width="78" height="56" opacity=".85"/>';
 // 칸
 const big={o4:1,o9:1,o14:1};
 for(const k in P){
  if(k==="ca"||k==="cb"||k==="START")continue;
  const [x,y]=P[k], r=big[k]?21:15;
  s+='<circle cx="'+x+'" cy="'+y+'" r="'+r+'" fill="#f4efe3" stroke="#38291a3a" stroke-width="1.6"/>';
 }
 // 출발/도착
 s+='<circle cx="440" cy="440" r="24" fill="#1e1208"/>';
 s+='<text x="440" y="445" text-anchor="middle" font-size="13" fill="#e9d3a4" font-family="sans-serif">출발</text>';
 // 말
 const groups={};
 players.forEach((p,pi)=>p.pieces.forEach(pc=>{
  if(pc.node==="HOME"||pc.node==="FIN")return;
  const k=sq(pc.node);(groups[k]=groups[k]||[]).push(pi);
 }));
 for(const k in groups){
  const pos=(k==="CEN")?[250,250]:P[k];
  const list=groups[k], byP={};
  list.forEach(pi=>byP[pi]=(byP[pi]||0)+1);
  const keys=Object.keys(byP);
  keys.forEach((pi,i)=>{
   const off=keys.length>1?(i-(keys.length-1)/2)*17:0;
   const cx=pos[0]+off, cy=pos[1]-(k==="CEN"?34:0);
   s+='<circle cx="'+cx+'" cy="'+cy+'" r="13.5" fill="'+COLORS[pi]+'" stroke="#fffaf0" stroke-width="2.4"/>';
   if(byP[pi]>1)s+='<text x="'+cx+'" y="'+(cy+4.5)+'" text-anchor="middle" font-size="13" fill="#fff" font-family="sans-serif" font-weight="700">'+byP[pi]+'</text>';
  });
 }
 board.innerHTML=s;
}

/* ===== 윷 던지기 ===== */
const stEl=document.getElementById("sticks"), rlEl=document.getElementById("rlabel"),
      thBtn=document.getElementById("throw"), logEl=document.getElementById("log");
function drawSticks(arr){
 stEl.innerHTML=arr.map(v=>'<div class="stick '+(v?"up":"dn")+'"></div>').join("");
}
drawSticks([1,0,1,0]);
function setLabel(t,sub){rlEl.innerHTML=t?(t+(sub?'<small>'+sub+'</small>':"")):"&nbsp;";}
function log(t){logEl.textContent=t||" ";}

const NAMES={1:"도",2:"개",3:"걸",4:"윷",5:"모"};
thBtn.onclick=()=>{
 if(busy||throwsLeft<=0)return;
 busy=true;thBtn.disabled=true;chipsEl.innerHTML="";
 let n=0;
 const spin=setInterval(()=>{
  drawSticks([0,1,2,3].map(()=>Math.random()<0.5?1:0));
  if(++n>7){
   clearInterval(spin);
   const arr=[0,1,2,3].map(()=>Math.random()<0.5?1:0);
   drawSticks(arr);
   const flat=arr.reduce((a,b)=>a+b,0);
   const steps=flat===0?5:flat;
   pending=steps;throwsLeft--;
   setLabel(NAMES[steps], steps+"칸");
   if(steps>=4){throwsLeft++;log("윷·모! 한 번 더 던집니다");}
   busy=false;
   offerMoves();
  }
 },70);
};

/* ===== 이동 후보 ===== */
function offerMoves(){
 const p=players[turn];
 const units={};
 p.pieces.forEach((pc,i)=>{
  if(pc.node==="FIN")return;
  const k=pc.node==="HOME"?"HOME":sq(pc.node);
  (units[k]=units[k]||{idx:[],node:pc.node}).idx.push(i);
 });
 const keys=Object.keys(units);
 if(!keys.length){ endTurn(); return; }
 chipsEl.innerHTML="";
 keys.forEach(k=>{
  const u=units[k];
  const dest=advance(u.node,pending);
  const b=document.createElement("button");b.className="chip";
  const who=(u.node==="HOME"?"대기 말":"말 "+distLeft(u.node)+"칸 남음")+(u.idx.length>1?" ×"+u.idx.length:"");
  b.textContent=who+(dest==="FIN"?" → 완주!":"");
  b.onclick=()=>doMove(u.idx,dest);
  chipsEl.appendChild(b);
 });
 thBtn.disabled = throwsLeft<=0;
 if(throwsLeft>0)log("말을 고르거나, 한 번 더 던지세요");
 else log("움직일 말을 고르세요");
}

function doMove(idx,dest){
 const p=players[turn];
 let msg="";
 // 잡기
 let caught=false;
 if(dest!=="FIN"){
  players.forEach((op,oi)=>{
   if(oi===turn)return;
   op.pieces.forEach(pc=>{
    if(pc.node!=="HOME"&&pc.node!=="FIN"&&sq(pc.node)===sq(dest)){pc.node="HOME";caught=true;
      msg=op.name+" 말을 잡았습니다";}
   });
  });
 }
 idx.forEach(i=>p.pieces[i].node=dest);
 if(dest==="FIN")msg=(msg?msg+" · ":"")+"말 "+idx.length+"개 완주";
 pending=0;chipsEl.innerHTML="";setLabel("");
 drawBoard();syncTurn();
 if(p.pieces.every(pc=>pc.node==="FIN")){ showWin(p); return; }
 if(caught){throwsLeft++;log(msg+" · 한 번 더!");}
 else log(msg||"이동했습니다");
 if(throwsLeft>0){thBtn.disabled=false;}
 else endTurn();
}

function endTurn(){
 pending=0;chipsEl.innerHTML="";
 turn=(turn+1)%players.length;
 throwsLeft=1;thBtn.disabled=false;setLabel("");
 syncTurn();
 log(players[turn].name+" 차례");
}

function syncTurn(){
 const p=players[turn];
 document.getElementById("tdot").style.background=p.color;
 document.getElementById("tname").textContent=p.name;
 document.getElementById("tsub").textContent="말 "+p.pieces.filter(x=>x.node==="FIN").length+"/2 완주";
 document.getElementById("scores").innerHTML=players.map((q,i)=>
  '<div class="sc'+(i===turn?" cur":"")+'"><div class="sn kr">'+
  '<span class="dot" style="display:inline-block;width:9px;height:9px;background:'+q.color+';margin-right:5px"></span>'+
  q.name+'</div><div class="sv">'+q.pieces.filter(x=>x.node==="FIN").length+' / 2</div></div>').join("");
}

function showWin(p){
 document.getElementById("winner").textContent=p.name;
 const others=players.filter(q=>q!==p);
 document.getElementById("wsub").textContent="말 두 개를 모두 들여보냈습니다";
 document.getElementById("wpen").textContent=others.map(q=>q.name).join(", ")+" 한 잔씩.";
 document.getElementById("winbox").classList.add("on");
}
document.getElementById("again").onclick=()=>{
 players.forEach(p=>p.pieces.forEach(pc=>pc.node="HOME"));
 turn=0;throwsLeft=1;pending=0;thBtn.disabled=false;
 document.getElementById("winbox").classList.remove("on");
 drawBoard();syncTurn();setLabel("");log("윷을 던지세요");
};
document.getElementById("again2").onclick=()=>{
 document.getElementById("winbox").classList.remove("on");
 document.getElementById("game").style.display="none";
 document.getElementById("setup").style.display="block";
};
</script>
