<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pine &amp; Co Seoul — Reserve</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&family=Cinzel:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1e1208;--cream:#f0ebe0;--gold:#b8935a;--amber:#c9a96e;--muted:#7a6550;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--ink);color:var(--cream);min-height:100vh;display:flex;flex-direction:column;}
.content{flex:1;display:flex;flex-direction:column;align-items:center;padding:0 24px 80px;max-width:460px;margin:0 auto;width:100%;}
.logo-header{padding:40px 0 20px;display:flex;flex-direction:column;align-items:center;}
.logo-img{width:140px;height:auto;}
.divider{display:flex;align-items:center;gap:14px;width:100%;margin:0 0 18px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.divider span{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.22em;color:var(--gold);white-space:nowrap;}
.form-wrap{width:100%;display:flex;flex-direction:column;gap:16px;}
.field label{display:block;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;color:var(--amber);margin-bottom:6px;}
.field input,.field select{width:100%;background:rgba(240,235,224,.06);border:1px solid rgba(184,147,90,.25);border-radius:6px;
  padding:14px 16px;font-size:16px;color:var(--cream);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border .2s;-webkit-appearance:none;}
.field input:focus,.field select:focus{border-color:var(--gold);}
.field input::placeholder{color:rgba(240,235,224,.25);}
.field select option{background:var(--ink);color:var(--cream);}
.btn-primary{width:100%;padding:16px;border:none;border-radius:6px;cursor:pointer;
  font-family:'Cinzel',serif;font-size:13px;letter-spacing:.14em;font-weight:500;
  background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--ink);
  transition:opacity .2s,transform .1s;margin-top:4px;}
.btn-primary:hover{opacity:.92;}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.5;cursor:default;}
.form-hint{text-align:center;font-size:11px;color:var(--muted);margin-top:14px;line-height:1.7;}
.size-row{display:flex;gap:8px;flex-wrap:wrap;}
.sz-btn{width:44px;height:44px;border:1px solid rgba(184,147,90,.25);border-radius:8px;
  background:rgba(240,235,224,.06);color:var(--cream);font-family:'Cormorant Garamond',serif;
  font-size:18px;cursor:pointer;transition:all .15s;}
.sz-btn:hover{background:rgba(184,147,90,.12);}
.sz-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);font-weight:600;}
.zone-row{display:flex;gap:10px;}
.zone-btn{flex:1;padding:14px 8px;border:1px solid rgba(184,147,90,.25);border-radius:8px;
  background:rgba(240,235,224,.06);color:var(--cream);font-family:'Cinzel',serif;
  font-size:12px;letter-spacing:.1em;text-align:center;cursor:pointer;transition:all .15s;line-height:1.4;}
.zone-btn:hover{background:rgba(184,147,90,.12);}
.zone-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.zone-btn .zone-sub{font-family:'Noto Sans KR',sans-serif;font-size:10px;color:var(--muted);margin-top:4px;display:block;}
.zone-btn.active .zone-sub{color:rgba(30,18,8,.6);}
.zone-avail{font-family:'Cormorant Garamond',serif;font-size:14px;display:block;margin-bottom:2px;}
.slot-row{display:flex;gap:8px;flex-wrap:wrap;}
.slot-btn{padding:12px 18px;border:1px solid rgba(184,147,90,.25);border-radius:8px;
  background:rgba(240,235,224,.06);color:var(--cream);font-family:'Cormorant Garamond',serif;
  font-size:18px;cursor:pointer;transition:all .15s;}
.slot-btn:hover{background:rgba(184,147,90,.12);}
.slot-btn.active{background:var(--gold);color:var(--ink);border-color:var(--gold);}
.slot-btn.full{opacity:.3;cursor:not-allowed;text-decoration:line-through;}
.confirm-card{width:100%;text-align:center;padding:24px 0;}
.confirm-num{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:300;color:var(--gold);line-height:1;}
.confirm-detail{font-size:13px;color:var(--cream);margin-top:12px;line-height:1.8;}
.confirm-detail strong{color:var(--gold);}
.room-note{font-size:11px;color:var(--amber);margin-top:4px;}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);
  background:rgba(30,18,8,.92);border:1px solid var(--gold);color:var(--cream);border-radius:8px;
  font-size:13px;padding:12px 24px;z-index:99;white-space:nowrap;max-width:90vw;text-align:center;
  pointer-events:none;opacity:0;transition:opacity .3s;backdrop-filter:blur(12px);}
.toast.show{opacity:1;}
</style>
</head>

<div class="toast" id="toast"></div>
<script>
let avail={},selectedDate='',selectedTime='',selectedZone='',partySize=2,confirmed=null;
async function safeFetch(url,opts){try{const r=await fetch(url,opts);const d=await r.json();return{ok:r.ok,data:d};}catch{return{ok:false,data:null};}}
function flash(msg){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show';setTimeout(()=>t.className='toast',3500);}
function todayKST(){const now=new Date();return new Date(now.getTime()+9*60*60*1000).toISOString().slice(0,10);}
function pickSize(n){partySize=n;render();}
function pickZone(z){selectedZone=z;render();}
function pickTime(t){selectedTime=t;selectedZone='';render();}
async function pickDate(d){selectedDate=d;selectedTime='';selectedZone='';const res=await safeFetch('/api/availability/'+d);if(res.ok)avail=res.data;render();}
async function submitReserve(){
  const name=document.getElementById('rn')?.value.trim(),phone=document.getElementById('rp')?.value.trim();
  if(!name){flash('Please enter your name.');return;}
  if(!phone||phone.replace(/[^0-9]/g,'').length<7){flash('Please enter a valid phone number.');return;}
  if(!selectedDate||!selectedTime||!selectedZone){flash('Please select date, time, and zone.');return;}
  const btn=document.getElementById('rbtn');if(btn){btn.disabled=true;btn.textContent='RESERVING...';}
  const res=await safeFetch('/api/reserve',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name,phone,partySize,zone:selectedZone,date:selectedDate,time:selectedTime})});
  if(!res.ok){flash(res.data?.error||'Reservation failed.');if(btn){btn.disabled=false;btn.textContent='RESERVE';}return;}
  confirmed=res.data;render();
}
function getDateOptions(){
  const dates=[];const base=new Date(todayKST()+'T00:00:00+09:00');
  for(let i=0;i<31;i++){const d=new Date(base.getTime()+i*86400000);
    dates.push({value:d.toISOString().slice(0,10),
      label:d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',timeZone:'Asia/Seoul'}),
      day:d.getDay()});}
  return dates;
}
function fmtPhone(v){if(v.startsWith('+'))return v;const d=v.replace(/\D/g,'').slice(0,11);if(d.length<=3)return d;if(d.length<=7)return d.slice(0,3)+'-'+d.slice(3);return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);}
function render(){
  const app=document.getElementById('app');if(!app)return;
  if(confirmed){
    const zn={bar:'Bar',table:'Table',room:'Private Room'};
    app.innerHTML='<div class="confirm-card"><div class="confirm-num">'+confirmed.time+'</div><div class="confirm-detail"><strong>'+confirmed.date+'</strong> &middot; '+zn[confirmed.zone]+'<br>'+confirmed.name+' &middot; '+confirmed.partySize+' guest'+(confirmed.partySize>1?'s':'')+'<br>Seat: <strong>'+confirmed.assignedSeats.join(', ')+'</strong>'+(confirmed.zone==='room'?'<div class="room-note">Minimum charge: \u20a9300,000</div>':'')+'</div><p class="form-hint" style="margin-top:24px">\uc608\uc57d\uc774 \ud655\uc815\ub418\uc5c8\uc2b5\ub2c8\ub2e4.<br>Your reservation is confirmed.<br><br>\uc608\uc57d \uc804\ub0a0\uacfc \ub2f9\uc77c\uc5d0 \ud655\uc778 \ubb38\uc790\ub97c \ubcf4\ub0b4\ub4dc\ub9bd\ub2c8\ub2e4.<br>You will receive a reminder the day before and on the day.<br><br>\uc608\uc57d \ucde8\uc18c\ub97c \uc6d0\ud558\uc2dc\uba74 \uc804\ud654 \ubd80\ud0c1\ub4dc\ub9bd\ub2c8\ub2e4.<br>To cancel, please call us at<br><strong style="color:var(--gold)">010-6817-0406</strong></p></div>';
    return;
  }
  const dates=getDateOptions();
  let h='<div class="divider"><span>RESERVATION</span></div><div class="form-wrap">';
  h+='<div class="field"><label>DATE</label><select id="date-sel" onchange="pickDate(this.value)"><option value="">Select a date</option>';
  dates.forEach(d=>{h+='<option value="'+d.value+'"'+(d.value===selectedDate?' selected':'')+'>'+d.label+(d.day===5||d.day===6?' (Weekend)':'')+'</option>';});
  h+='</select></div>';
  if(selectedDate&&avail.closed){
    h+='<div style="text-align:center;padding:20px;border:1px solid rgba(192,112,112,.25);border-radius:10px;background:rgba(192,112,112,.05);margin-top:8px;">';
    h+='<div style="font-size:14px;color:#d08080;margin-bottom:8px;">Reservations closed for today</div>';
    h+='<div style="font-size:12px;color:var(--cream);line-height:1.7;">당일 예약은 오후 5시에 마감됩니다.<br>Same-day reservations close at 5 PM.<br>Please walk in or call us.</div>';
    h+='<a href="tel:010-6817-0406" style="display:inline-block;margin-top:12px;padding:10px 24px;border:1px solid var(--gold);border-radius:6px;color:var(--gold);text-decoration:none;font-family:Cinzel,serif;font-size:12px;">📞 010-6817-0406</a>';
    h+='</div>';
  }
  if(selectedDate&&avail.slots&&avail.slots.length>0){
    h+='<div class="field"><label>TIME</label><div class="slot-row">';
    avail.slots.forEach(t=>{const a=avail.availability?.[t];const tot=(a?.bar||0)+(a?.table||0)+(a?.room||0);const full=tot===0;
      h+='<button class="slot-btn'+(selectedTime===t?' active':'')+(full?' full':'')+'" onclick="'+(full?'':'pickTime(\''+t+'\')')+'">'+t+'</button>';});
    h+='</div></div>';
  }
  // PARTY SIZE first (before zone)
  if(selectedTime){
    h+='<div class="field"><label>PARTY SIZE</label><div class="size-row">';
    for(let n=1;n<=10;n++){h+='<button class="sz-btn'+(partySize===n?' active':'')+'" onclick="pickSize('+n+')">'+n+'</button>';}
    h+='</div></div>';
  }
  // ZONE selection (filtered by party size)
  if(selectedTime&&avail.availability){
    const a=avail.availability[selectedTime];
    if(partySize>=6){
      // 6+ guests: ROOM ONLY
      if(a?.room){
        h+='<div class="field"><label>ZONE</label><div class="zone-row">';
        h+='<button class="zone-btn active" onclick="pickZone(\'room\')"><span class="zone-avail">Open</span>PRIVATE ROOM<span class="zone-sub">6-10 guests</span></button>';
        h+='</div>';
        h+='<div style="text-align:center;margin-top:8px;padding:12px;border:1px solid rgba(184,147,90,.25);border-radius:8px;background:rgba(184,147,90,.06);">';
        h+='<span style="font-size:12px;color:var(--amber);">\u26a0 Minimum charge: \u20a9300,000</span><br>';
        h+='<span style="font-size:11px;color:var(--muted);">\ud504\ub77c\uc774\ube57 \ub8f8\uc740 \ucd5c\uc18c 30\ub9cc\uc6d0 \ubcf4\uc99d\uae08\uc774 \uc788\uc2b5\ub2c8\ub2e4.</span>';
        h+='</div></div>';
        if(!selectedZone)selectedZone='room';
      }else{
        h+='<div style="text-align:center;padding:20px;border:1px solid rgba(192,112,112,.3);border-radius:10px;background:rgba(192,112,112,.06);margin-top:8px;">';
        h+='<div style="font-size:14px;color:#d08080;margin-bottom:8px;">No availability for '+partySize+' guests</div>';
        h+='<div style="font-size:12px;color:var(--cream);line-height:1.7;">Please walk in or call us directly.<br>\uc6cc\ud06c\uc778 \ub610\ub294 \uc804\ud654\ub85c \ubb38\uc758\ud574\uc8fc\uc138\uc694.</div>';
        h+='<a href="tel:010-6817-0406" style="display:inline-block;margin-top:12px;padding:10px 24px;border:1px solid var(--gold);border-radius:6px;color:var(--gold);text-decoration:none;font-family:Cinzel,serif;font-size:12px;">\ud83d\udcde 010-6817-0406</a>';
        h+='</div>';
        selectedZone='';
      }
    }else if(partySize>=3&&partySize<=5){
      // 3-5: TABLE only
      h+='<div class="field"><label>ZONE</label><div class="zone-row">';
      h+='<button class="zone-btn'+(selectedZone==='table'?' active':'')+'" onclick="pickZone(\'table\')"><span class="zone-avail">'+(a?.table||0)+'</span>TABLE<span class="zone-sub">3-5 guests</span></button>';
      h+='</div></div>';
    }else{
      // 1-2: BAR or HIGH TABLE
      h+='<div class="field"><label>ZONE</label><div class="zone-row">';
      h+='<button class="zone-btn'+(selectedZone==='bar'?' active':'')+'" onclick="pickZone(\'bar\')"><span class="zone-avail">'+(a?.bar||0)+'</span>BAR<span class="zone-sub">seats open</span></button>';
      h+='<button class="zone-btn'+(selectedZone==='table'?' active':'')+'" onclick="pickZone(\'table\')"><span class="zone-avail">'+(a?.table||0)+'</span>HIGH TABLE<span class="zone-sub">tables open</span></button>';
      h+='</div></div>';
    }
  }
  if(selectedZone){
    h+='<div class="field"><label>NAME</label><input id="rn" placeholder="Your name" autocomplete="off"/></div>';
    h+='<div class="field"><label>PHONE NUMBER</label><input id="rp" type="tel" placeholder="+82 10 or international" oninput="this.value=fmtPhone(this.value)"/></div>';
    h+='<button class="btn-primary" id="rbtn" onclick="submitReserve()">RESERVE</button>';
    h+='<p class="form-hint">\uc608\uc57d \ud655\uc778 \ubb38\uc790\ub97c \ubcf4\ub0b4\ub4dc\ub9bd\ub2c8\ub2e4<br>You will receive a confirmation message<br><br>\uc608\uc57d \ucde8\uc18c\ub294 \uc804\ud654\ub85c\ub9cc \uac00\ub2a5\ud569\ub2c8\ub2e4<br>To cancel, please call 010-6817-0406</p>';
  }
  h+='</div>';
  app.innerHTML=h;
}
render();
</script>
</body>
</html>
