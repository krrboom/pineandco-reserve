<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pine &amp; Co Seoul — Reserve</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#1e1208;--cream:#f0ebe0;--gold:#b8935a;--amber:#c9a96e;--bg:#0d0a06;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden;}
canvas#rings{position:fixed;top:0;left:0;width:100%;height:100%;opacity:.08;pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:24px 20px 60px;}
.logo{text-align:center;}.lt{font-family:Cinzel,serif;font-size:28px;letter-spacing:.15em;color:var(--gold);font-weight:400;}
.ls{font-family:Cinzel,serif;font-size:11px;letter-spacing:.35em;color:var(--amber);opacity:.7;}
.hrs{text-align:center;font-size:11px;color:var(--amber);opacity:.5;margin:4px 0 8px;}
.dv{width:60px;height:1px;background:var(--gold);margin:12px auto 20px;opacity:.4;}
h2{font-family:Cinzel,serif;font-size:13px;letter-spacing:.12em;color:var(--gold);font-weight:400;margin-bottom:12px;}
.back{background:none;border:none;color:var(--amber);font-size:12px;cursor:pointer;opacity:.6;margin-bottom:12px;}.back:hover{opacity:1;}
.prog{display:flex;gap:6px;margin-bottom:16px;justify-content:center;}
.prog .dot{width:8px;height:8px;border-radius:50%;background:rgba(184,147,90,.15);transition:background .3s;}
.prog .dot.on{background:var(--gold);}
/* Calendar */
.cn2{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px;}
.cn2 button{background:none;border:1px solid rgba(184,147,90,.2);border-radius:6px;color:var(--gold);width:32px;height:32px;font-size:14px;cursor:pointer;}
.cn2 .ml{font-family:Cinzel,serif;font-size:14px;color:var(--gold);min-width:130px;text-align:center;}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.ch{text-align:center;font-size:10px;color:var(--amber);padding:4px 0;opacity:.6;}
.cc{background:rgba(184,147,90,.04);border:1px solid rgba(184,147,90,.08);border-radius:6px;min-height:38px;display:flex;align-items:center;justify-content:center;flex-direction:column;cursor:pointer;transition:all .15s;padding:2px;}
.cc:hover{border-color:var(--gold);background:rgba(184,147,90,.1);}
.cc.td{border-color:var(--gold);}.cc.sel{background:rgba(184,147,90,.2);border-color:var(--gold);}
.cc.dis{opacity:.2;pointer-events:none;}.cc.ev{background:rgba(163,51,51,.12);border-color:rgba(163,51,51,.25);pointer-events:none;}
.cc .dn{font-size:12px;}.cc .dn.sun{color:#c66;}.cc.ev .el{font-size:7px;color:#c66;margin-top:1px;}.cc.om{opacity:.15;pointer-events:none;}
/* Time */
.tg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.tb{background:rgba(184,147,90,.06);border:1px solid rgba(184,147,90,.2);border-radius:8px;color:var(--cream);padding:14px;font-family:Cinzel,serif;font-size:16px;cursor:pointer;text-align:center;transition:all .2s;}
.tb:hover{border-color:var(--gold);}.tb.sel{border-color:var(--gold);background:rgba(184,147,90,.2);color:var(--gold);}
.tb.full{opacity:.3;pointer-events:none;text-decoration:line-through;}
.tb .sub{font-family:'Noto Sans KR',sans-serif;font-size:10px;opacity:.5;display:block;margin-top:3px;}
/* Size */
.sr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.sb2{width:44px;height:44px;border:1px solid rgba(184,147,90,.2);border-radius:8px;background:none;color:var(--cream);font-size:16px;cursor:pointer;font-family:Cinzel,serif;transition:all .2s;}
.sb2:hover{border-color:var(--gold);}.sb2.sel{border-color:var(--gold);background:rgba(184,147,90,.2);color:var(--gold);}
.note{font-size:12px;color:var(--amber);opacity:.7;margin-top:8px;line-height:1.6;}
.warn{font-size:12px;color:#e8a855;margin:10px 0;padding:10px;border:1px solid rgba(232,168,85,.2);border-radius:6px;background:rgba(232,168,85,.06);line-height:1.6;}
input,textarea{width:100%;background:rgba(240,235,224,.05);border:1px solid rgba(184,147,90,.2);border-radius:8px;padding:14px 16px;color:var(--cream);font-size:15px;font-family:'Noto Sans KR',sans-serif;margin-bottom:10px;outline:none;transition:border-color .2s;}
input:focus,textarea:focus{border-color:var(--gold);}input::placeholder,textarea::placeholder{color:rgba(240,235,224,.3);}
textarea{resize:vertical;min-height:60px;font-size:14px;}
.ilbl{font-size:11px;color:var(--amber);opacity:.5;margin-bottom:4px;}
.nbtn{width:100%;padding:16px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--gold),var(--amber));color:var(--ink);font-family:Cinzel,serif;font-size:13px;letter-spacing:.12em;cursor:pointer;margin-top:8px;}
.nbtn:disabled{opacity:.4;cursor:default;}
.cbox{text-align:center;padding:20px 0;}.cbox .cic{font-size:40px;margin-bottom:12px;}
.cbox h3{font-family:Cinzel,serif;font-size:18px;color:var(--gold);font-weight:400;margin-bottom:16px;}
.cbox .det{font-size:14px;line-height:2;}.cbox .det strong{color:var(--gold);}
.cbox .cnn{font-size:12px;color:var(--amber);margin-top:16px;line-height:1.6;opacity:.8;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(30,18,8,.95);border:1px solid var(--gold);color:var(--cream);border-radius:8px;font-size:13px;padding:12px 24px;z-index:99;opacity:0;transition:opacity .3s;pointer-events:none;}.toast.show{opacity:1;}
.hint{font-size:11px;color:var(--amber);opacity:.4;margin-top:4px;line-height:1.5;}
.phone-row{display:flex;gap:6px;margin-bottom:10px;}
.phone-row select{width:110px;background:rgba(240,235,224,.05);border:1px solid rgba(184,147,90,.2);border-radius:8px;padding:14px 8px;color:var(--cream);font-size:13px;font-family:'Noto Sans KR',sans-serif;outline:none;-webkit-appearance:none;appearance:none;}
.phone-row select:focus{border-color:var(--gold);}
.phone-row select option{background:#1e1208;color:var(--cream);}
.phone-row input{flex:1;}
</style></head><body>
<canvas id="rings"></canvas>
<div class="wrap">
<div class="logo"><div class="lt">PINE &amp; CO</div><div class="ls">SEOUL</div></div>
<div class="hrs">Open 7PM — 2AM</div>
<div class="dv"></div>
<div id="app"></div>
</div>
<div class="toast" id="toast"></div>
<script>
var DK=['일','월','화','수','목','금','토'],MN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var step=1,selDate='',selTime='',partySize=0,confirmed=null,avail={},evts={},calY,calM,savedSR='';

function kst(){return new Date(Date.now()+9*3600000);}
function td2(){return kst().toISOString().slice(0,10);}
function flash(m){var t=document.getElementById('toast');t.textContent=m;t.className='toast show';setTimeout(function(){t.className='toast';},3000);}

(function(){var n=kst();calY=n.getFullYear();calM=n.getMonth();
fetch('/api/events').then(function(r){return r.json();}).then(function(d){evts=d;render();}).catch(function(){render();});
})();

function shiftCal(n){calM+=n;if(calM>11){calM=0;calY++;}if(calM<0){calM=11;calY--;}render();}
function goStep(s){
  if(step===2&&s===3){var el=document.getElementById('sr');if(el)savedSR=el.value.trim();}
  step=s;render();
}

function render(){
var app=document.getElementById('app'),h='';
if(step<=3){h+='<div class="prog">';for(var i=1;i<=3;i++)h+='<div class="dot'+(i<=step?' on':'')+'"></div>';h+='</div>';}

// ═══ STEP 1: CALENDAR ═══
if(step===1){
h+='<h2>1. SELECT DATE · 날짜 선택</h2>';
h+='<div class="cn2"><button onclick="shiftCal(-1)">&larr;</button><div class="ml">'+MN[calM]+' '+calY+'</div><button onclick="shiftCal(1)">&rarr;</button></div>';
h+='<div class="cg">';
DK.forEach(function(d){h+='<div class="ch">'+d+'</div>';});
var first=new Date(calY,calM,1),sd=first.getDay(),dim=new Date(calY,calM+1,0).getDate(),pd=new Date(calY,calM,0).getDate();
var today=td2(),maxD=new Date(kst().getTime()+62*86400000).toISOString().slice(0,10);
for(var i=sd-1;i>=0;i--)h+='<div class="cc om"><div class="dn">'+(pd-i)+'</div></div>';
for(var d=1;d<=dim;d++){
  var iso=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  var dow=new Date(calY,calM,d).getDay(),past=iso<=today,beyond=iso>maxD,ev=evts[iso];
  var cls='cc';if(iso===today)cls+=' td';if(past||beyond)cls+=' dis';if(ev)cls+=' ev';if(selDate===iso)cls+=' sel';
  h+='<div class="'+cls+'" '+((!past&&!beyond&&!ev)?'onclick="pickDate(\''+iso+'\')"':'')+'>';
  h+='<div class="dn'+(dow===0?' sun':'')+'">'+d+'</div>';
  if(ev)h+='<div class="el">EVENT</div>';
  h+='</div>';
}
var tc=sd+dim,rem=tc%7===0?0:7-tc%7;
for(var i=1;i<=rem;i++)h+='<div class="cc om"><div class="dn">'+i+'</div></div>';
h+='</div>';
}

// ═══ STEP 2: TIME + PARTY SIZE + SPECIAL REQUEST ═══
if(step===2){
h+='<button class="back" onclick="goStep(1)">← 날짜 다시 선택</button>';

// Check if fully booked (all slots have 0 seats)
var allFull=true;
var slots2=Object.keys(avail);
slots2.forEach(function(t){if(t.startsWith('_'))return;var a=avail[t];if(a.bar+a.tables+a.highTables+a.room>0)allFull=false;});
if(slots2.length===0)allFull=true;

if(allFull){
h+='<div style="text-align:center;padding:40px 20px;">';
h+='<div style="font-size:40px;margin-bottom:16px;">🌲</div>';
h+='<h2 style="font-size:16px;margin-bottom:12px;letter-spacing:.08em;">FULLY BOOKED</h2>';
h+='<div style="font-size:14px;color:var(--cream);line-height:1.8;margin-bottom:16px;">';
h+='죄송합니다, <strong style="color:var(--gold);">'+selDate+'</strong> 예약이 마감되었습니다.<br>';
h+='워크인(현장 방문)으로만 도와드릴 수 있습니다.</div>';
h+='<div style="font-size:13px;color:var(--amber);line-height:1.8;">';
h+='Sorry, <strong>'+selDate+'</strong> is fully booked.<br>';
h+='Walk-ins are welcome!</div>';
h+='<div style="margin-top:20px;font-size:12px;color:var(--amber);opacity:.6;">';
h+='영업시간: 7PM — 2AM</div>';
h+='<button class="nbtn" style="margin-top:20px;max-width:200px;" onclick="goStep(1)">다른 날짜 선택</button>';
h+='</div>';
} else {

h+='<h2>2. TIME &amp; DETAILS · 시간 및 인원</h2>';
h+='<div class="note" style="margin-bottom:12px">📅 '+selDate+'</div>';

h+='<div class="ilbl">시간 선택 / Select time *</div>';
h+='<div class="tg" style="margin-bottom:16px">';
var slots=Object.keys(avail);
if(!slots.length) h+='<div style="grid-column:1/-1;text-align:center;color:var(--amber);padding:20px;">예약 가능한 시간이 없습니다.</div>';
slots.forEach(function(t){
  var a=avail[t],total=a.bar+a.tables+a.highTables+a.room,full=total===0;
  h+='<button class="tb'+(selTime===t?' sel':'')+(full?' full':'')+'" onclick="pickTime(\''+t+'\')">'+t;
  if(a.isLate)h+='<span class="sub">Late night · Limited</span>';
  if(full)h+='<span class="sub">FULL</span>';
  h+='</button>';
});
h+='</div>';

if(selTime){
  h+='<div class="ilbl">인원 / Party size *</div>';
  h+='<div class="sr">';
  for(var i=1;i<=10;i++)h+='<button class="sb2'+(partySize===i?' sel':'')+'" onclick="pickSize('+i+')">'+i+'</button>';
  h+='</div>';

  if(partySize>=6)h+='<div class="note">🔑 6명 이상은 프라이빗 룸 배정 (미니멈차지 30만원)</div>';
  if(partySize>=9)h+='<div class="note">※ '+partySize+'명은 룸이 다소 좁을 수 있습니다.</div>';

  h+='<div class="ilbl" style="margin-top:12px">요구사항 / Special requests (optional)</div>';
  h+='<textarea id="sr" placeholder="예: 바 좌석 원합니다 / 생일파티 / 조용한 자리 / Bar seat please...">'+(savedSR||'')+'</textarea>';
  h+='<div class="hint">💡 "바", "테이블", "룸" 키워드를 적으면 자동으로 좌석이 배정됩니다.<br>💡 Keywords like "bar", "table", "room" will auto-assign seating.</div>';
}

if(selTime&&partySize>0)h+='<button class="nbtn" style="margin-top:12px" onclick="goStep(3)">NEXT → 연락처 입력</button>';
} // end of else (not full)
}

// ═══ STEP 3: CONTACT INFO ═══
if(step===3){
h+='<button class="back" onclick="goStep(2)">← 뒤로</button>';
h+='<h2>3. CONTACT INFO · 연락처</h2>';
h+='<div class="note" style="margin-bottom:12px">📅 '+selDate+' · ⏰ '+selTime+' · '+partySize+'명'+(savedSR?' · 📝 '+savedSR:'')+'</div>';
h+='<div class="warn">⚠️ 예약 확인을 위해 <strong>이메일 또는 전화번호</strong>를 반드시 입력해주세요.<br>Please provide your <strong>email or phone number</strong> for confirmation.</div>';
h+='<div class="ilbl">이름 / Name *</div>';
h+='<input type="text" id="rn" placeholder="홍길동 / John" autocomplete="name"/>';
h+='<div class="ilbl">전화번호 / Phone</div>';
h+='<div class="phone-row">';
h+='<select id="rcc">';
h+='<option value="+82">🇰🇷 +82</option>';
h+='<option value="+1">🇺🇸 +1</option>';
h+='<option value="+44">🇬🇧 +44</option>';
h+='<option value="+81">🇯🇵 +81</option>';
h+='<option value="+86">🇨🇳 +86</option>';
h+='<option value="+852">🇭🇰 +852</option>';
h+='<option value="+886">🇹🇼 +886</option>';
h+='<option value="+65">🇸🇬 +65</option>';
h+='<option value="+61">🇦🇺 +61</option>';
h+='<option value="+49">🇩🇪 +49</option>';
h+='<option value="+33">🇫🇷 +33</option>';
h+='<option value="+39">🇮🇹 +39</option>';
h+='<option value="+34">🇪🇸 +34</option>';
h+='<option value="+66">🇹🇭 +66</option>';
h+='<option value="+84">🇻🇳 +84</option>';
h+='<option value="+60">🇲🇾 +60</option>';
h+='<option value="+63">🇵🇭 +63</option>';
h+='<option value="+91">🇮🇳 +91</option>';
h+='</select>';
h+='<input type="tel" id="rp" placeholder="010-1234-5678" autocomplete="tel"/>';
h+='</div>';
h+='<div class="ilbl">이메일 / Email</div>';
h+='<input type="email" id="re" placeholder="you@email.com" autocomplete="email"/>';
h+='<div class="ilbl">Instagram (optional)</div>';
h+='<input type="text" id="ri" placeholder="@your_handle"/>';
h+='<button class="nbtn" id="sbtn" onclick="doSubmit()">RESERVE · 예약하기</button>';
h+='<div class="note" style="margin-top:12px;text-align:center">예약 취소는 전화로만 가능합니다.<br>Cancellation by phone only.</div>';
}

// ═══ STEP 4: CONFIRMED ═══
if(step===4&&confirmed){
var zn={bar:'바 좌석',table:'테이블',highTable:'하이테이블',room:'프라이빗 룸'};
h+='<div class="cbox"><div class="cic">🌲</div><h3>RESERVATION CONFIRMED</h3>';
h+='<div class="det"><strong>'+confirmed.date+'</strong> '+confirmed.time+'<br>';
h+='<strong>'+confirmed.partySize+'</strong>명 · '+confirmed.name+'<br>';
h+='좌석: <strong>'+(zn[confirmed.zone]||confirmed.zone)+'</strong>';
if(confirmed.zone==='room')h+=' (미니멈차지 30만원)';
h+='</div>';
h+='<div class="cnn">';
if(confirmed.email)h+='📧 확인 이메일이 발송되었습니다.<br>';
if(confirmed.phone)h+='📱 확인 문자가 발송되었습니다.<br>';
h+='<br>취소는 전화로만: <strong>02-XXX-XXXX</strong></div></div>';
}

app.innerHTML=h;
}

async function pickDate(d){
if(evts[d]){flash('이 날짜는 이벤트로 예약 불가합니다.');return;}
selDate=d;selTime='';partySize=0;
var r=await fetch('/api/availability/'+d).then(function(x){return x.json();}).catch(function(){return {};});
if(r.blocked){flash('이 날짜는 이벤트로 예약 불가합니다.');return;}
avail=r;step=2;render();
}
function pickTime(t){selTime=t;partySize=0;render();}
function pickSize(n){partySize=n;render();}

async function doSubmit(){
var name=(document.getElementById('rn')||{}).value;if(name)name=name.trim();
var phone=(document.getElementById('rp')||{}).value;if(phone)phone=phone.trim();
var cc=(document.getElementById('rcc')||{}).value||'+82';
if(phone){phone=cc+phone.replace(/^0/,'');}
var email=(document.getElementById('re')||{}).value;if(email)email=email.trim();
var ig=(document.getElementById('ri')||{}).value;if(ig)ig=ig.trim();
if(!name){flash('이름을 입력해주세요.');return;}
if(!phone&&!email){flash('이메일 또는 전화번호를 입력해주세요.');return;}
var btn=document.getElementById('sbtn');if(btn){btn.disabled=true;btn.textContent='RESERVING...';}
var body={name:name,phone:phone||'',email:email||'',instagram:ig||'',partySize:partySize,date:selDate,time:selTime,specialRequest:savedSR};
try{
  var resp=await fetch('/api/reserve',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  var data=await resp.json();
  if(data.ok){confirmed=data.reservation;step=4;render();}
  else{flash(data.error||'예약 실패');if(btn){btn.disabled=false;btn.textContent='RESERVE · 예약하기';}}
}catch(e){flash('네트워크 오류');if(btn){btn.disabled=false;btn.textContent='RESERVE · 예약하기';}}
}

// Tree-ring canvas
(function(){var c=document.getElementById('rings'),x=c.getContext('2d'),W,H;
function rs(){W=c.width=innerWidth;H=c.height=innerHeight;}rs();addEventListener('resize',rs);
var t=0;(function d(){x.clearRect(0,0,W,H);var cx=W*.5,cy=H*.45;
for(var i=1;i<=18;i++){var r=i*Math.min(W,H)*.032,w=Math.sin(t*.0008+i*.5)*r*.06;
x.beginPath();for(var a=0;a<=Math.PI*2;a+=.02){var n=Math.sin(a*3+i)*r*.04+Math.cos(a*5+t*.001)*w;
var px=cx+Math.cos(a)*(r+n),py=cy+Math.sin(a)*(r+n);a===0?x.moveTo(px,py):x.lineTo(px,py);}
x.closePath();x.strokeStyle='rgba(184,147,90,'+(0.15-i*.006)+')';x.lineWidth=.8;x.stroke();}
t++;requestAnimationFrame(d);})();})();
</script></body></html>
